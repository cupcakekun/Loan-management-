<title>היד על הדופק 💳</title>

<style>
:root{
  --bg:#070712;--bg2:#0d0d1f;--bg3:#161630;
  --border:rgba(255,255,255,.07);
  --text:#f1f5f9;--text2:#94a3b8;--text3:#475569;--text4:#64748b;
  --accent:#6366f1;--accent2:#8b5cf6;
  --red:#f87171;--green:#4ade80;--yellow:#fbbf24;--orange:#fb923c;--blue:#a5b4fc;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--text);font-family:'Heebo',sans-serif;direction:rtl;min-height:100vh;min-height:-webkit-fill-available;overscroll-behavior:none}
input,select,button,textarea{font-family:'Heebo',sans-serif;font-size:16px}
input::-webkit-inner-spin-button{opacity:.4}
input[type=month]{color-scheme:dark}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#334155;border-radius:4px}
select option{background:#1e1e3a;color:var(--text)}
button{-webkit-appearance:none;appearance:none}

/* ── Layout ── */
#app{min-height:100vh;min-height:-webkit-fill-available}
.hdr{background:linear-gradient(180deg,#0e0e22 0%,var(--bg) 100%);
  border-bottom:1px solid var(--border);
  padding:calc(var(--safe-top) + 18px) 16px 0;
  position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.wrap{max-width:540px;margin:0 auto}
.content{max-width:540px;margin:0 auto;padding:16px 16px calc(var(--safe-bot) + 80px)}

/* ── Inputs ── */
.inp{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
  border-radius:12px;padding:13px 15px;color:var(--text);font-size:16px;
  outline:none;width:100%;direction:rtl;transition:border-color .15s}
.inp:focus{border-color:var(--accent)}
.field-lbl{font-size:12px;color:var(--accent);font-weight:700;display:block;margin:14px 0 6px}
.field-lbl:first-child{margin-top:0}

/* ── Buttons ── */
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;color:#fff;border-radius:14px;padding:14px 0;cursor:pointer;
  font-weight:800;font-size:16px;width:100%;transition:opacity .15s}
.btn-primary:active{opacity:.8}
.btn-ghost{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  color:var(--text4);border-radius:14px;padding:14px 0;cursor:pointer;
  font-weight:700;font-size:15px;width:100%}
.btn-ghost:active{background:rgba(255,255,255,.1)}
.btn-icon{background:none;border:none;cursor:pointer;border-radius:10px;
  width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:15px;transition:background .15s}
.btn-icon:active{background:rgba(255,255,255,.12)}

/* ── Cards ── */
.card{background:linear-gradient(145deg,var(--bg2),var(--bg3));
  border-radius:22px;overflow:hidden;margin-bottom:14px;
  box-shadow:0 4px 24px rgba(0,0,0,.35)}
.stat-box{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);
  border-radius:14px;padding:14px 12px}

/* ── Tags ── */
.tag{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.5px}

/* ── Tabs ── */
.tabs{display:flex;gap:6px;padding:0 0 14px}
.tab{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);
  border-radius:12px;cursor:pointer;padding:9px 4px;font-size:11px;font-weight:700;
  color:var(--text4);transition:all .2s;position:relative;overflow:hidden}
.tab::after{content:'';position:absolute;bottom:0;left:10%;width:80%;height:0px;
  background:var(--tab-c,var(--accent));border-radius:2px 2px 0 0;transition:height .2s}
.tab.on{background:rgba(99,102,241,.12);border-color:var(--tab-c,var(--accent));
  color:var(--tab-c,var(--accent));font-weight:800}
.tab.on::after{height:3px}

/* ── Progress ── */
.prog-track{height:5px;background:rgba(255,255,255,.06);border-radius:10px;overflow:hidden}
.prog-fill{height:100%;border-radius:10px;transition:width .7s cubic-bezier(.4,0,.2,1)}

/* ── Modal ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:200;
  display:flex;align-items:flex-end;justify-content:center;
  animation:fadeIn .2s ease}
.sheet{background:linear-gradient(180deg,#12122a,#0d0d20);
  border-radius:24px 24px 0 0;padding:20px 20px calc(var(--safe-bot) + 20px);
  width:100%;max-width:540px;max-height:92vh;overflow-y:auto;
  animation:slideUp .25s cubic-bezier(.4,0,.2,1)}
.sheet-handle{width:40px;height:4px;background:rgba(255,255,255,.15);
  border-radius:2px;margin:0 auto 20px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}

/* ── Summary ── */
.sum-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.sum-box{border-radius:14px;padding:13px 10px;text-align:center}

/* ── Schedule ── */
.sched-row{display:grid;grid-template-columns:1fr 72px 72px 82px;gap:4px;
  padding:8px 6px;border-radius:10px;margin-bottom:2px;font-size:12px;transition:background .1s}

/* ── Empty ── */
.empty{text-align:center;padding:64px 0;color:var(--text4)}

/* ── Compare bars ── */
.cmp-card{background:rgba(255,255,255,.03);border-radius:18px;padding:18px;margin-bottom:12px}

/* ── Install banner ── */
.install-bar{background:linear-gradient(135deg,rgba(99,102,241,.15),rgba(139,92,246,.15));
  border-top:1px solid rgba(99,102,241,.2);padding:12px 16px;
  display:none;align-items:center;justify-content:space-between;gap:12px}

/* ── Animations ── */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.loading{animation:pulse 1.5s infinite}

.arrears-box{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.25);border-radius:16px;padding:16px;margin-bottom:14px}

/* ── Toggle switch ── */
.toggle-wrap{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-radius:12px;margin-bottom:3px;transition:background .15s;cursor:pointer;user-select:none;-webkit-user-select:none}
.toggle-wrap:active{background:rgba(255,255,255,.04)}
.toggle-wrap.is-missed{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2)}
.toggle-wrap.is-future{opacity:.4;cursor:default}
.toggle-wrap.is-cur{background:var(--cur-color,rgba(99,102,241,.1));border:1px solid var(--cur-border,rgba(99,102,241,.3))}
.sw{width:42px;height:22px;border-radius:11px;background:#334155;position:relative;transition:background .25s;flex-shrink:0}
.sw.on{background:#4ade80}
.sw.missed{background:#f87171}
.sw::after{content:'';position:absolute;width:18px;height:18px;background:#fff;border-radius:50%;top:2px;right:2px;transition:right .25s}
.sw.on::after,.sw.missed::after{right:22px}
/* ── Year accordion ── */
.yr-hdr{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;background:rgba(255,255,255,.04);border-radius:12px;margin-bottom:4px;cursor:pointer;font-weight:800;font-size:13px;transition:background .15s}
.yr-hdr:active{background:rgba(255,255,255,.08)}
.yr-hdr .yr-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:8px}
/* ── Sched view toggle ── */
.sched-view-btns{display:flex;gap:6px;margin-bottom:12px}
.sched-view-btn{flex:1;padding:7px 0;border:1px solid rgba(255,255,255,.1);background:transparent;border-radius:10px;font-size:12px;font-weight:700;color:var(--text4);cursor:pointer;transition:all .15s}
.sched-view-btn.on{background:rgba(99,102,241,.2);border-color:var(--accent);color:var(--blue)}

/* ── Utilities ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;align-items:end}
.row{display:flex;gap:8px;align-items:center}
.row-between{display:flex;justify-content:space-between;align-items:center}
.mt8{margin-top:8px} .mt12{margin-top:12px} .mt16{margin-top:16px} .mt20{margin-top:20px}
.mb8{margin-bottom:8px} .mb12{margin-bottom:12px} .mb16{margin-bottom:16px}
.bold{font-weight:700} .bolder{font-weight:800} .boldest{font-weight:900}
.small{font-size:12px} .smaller{font-size:11px} .xs{font-size:10px}
.dim{color:var(--text4)} .dim2{color:var(--text3)}
</style>

<body>
<div id="app"></div>
<script>
'use strict';
// ═══════════════════════════════════════════════════════════
//  CONSTANTS & STORAGE
// ═══════════════════════════════════════════════════════════
const K={loans:'yadv4_loans',cpi:'yadv4_cpi'};
const COLORS=['#3b82f6','#f59e0b','#10b981','#ef4444','#8b5cf6','#ec4899','#06b6d4','#14b8a6'];
const MONTHS=['ינו׳','פבר׳','מרץ','אפר׳','מאי','יוני','יולי','אוג׳','ספט׳','אוק׳','נוב׳','דצמ׳'];
const TYPES=['שפיצר','פריים','בלון','צמוד מדד','משכנתה מעורבת'];

const LS={
  get:(k,d)=>{try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):d;}catch{return d;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
};

// ═══════════════════════════════════════════════════════════
//  FORMATTERS
// ═══════════════════════════════════════════════════════════
const ils  = n=>new Intl.NumberFormat('he-IL',{style:'currency',currency:'ILS',maximumFractionDigits:0}).format(n||0);
const ils2 = n=>new Intl.NumberFormat('he-IL',{style:'currency',currency:'ILS',maximumFractionDigits:2}).format(n||0);
const fmtMY= d=>d?new Date(d).toLocaleDateString('he-IL',{month:'2-digit',year:'numeric'}):'—';
const ym   = (y,m)=>y+'-'+String(m).padStart(2,'0');
const nowYM= ()=>{const n=new Date();return ym(n.getFullYear(),n.getMonth()+1);};

// ═══════════════════════════════════════════════════════════
//  MATH ENGINE
// ═══════════════════════════════════════════════════════════
function parseDate(s){
  const p=(s||'').split('-').map(Number);
  return(!p[0]||!p[1]||isNaN(p[0])||isNaN(p[1]))?null:{y:p[0],m:p[1]};
}
function pmt(P,rate,n){
  const r=rate/100/12;
  if(r===0)return P/n;
  return P*(r*Math.pow(1+r,n))/(Math.pow(1+r,n)-1);
}
function primeAt(hist,ymStr){
  if(!hist||!hist.length)return 0;
  const s=[...hist].sort((a,b)=>a.date.localeCompare(b.date));
  let r=s[0].rate;
  for(const h of s){if(h.date<=ymStr)r=h.rate;else break;}
  return r;
}
function cpiAt(hist,ymStr){
  if(!hist||!hist.length)return 1;
  const s=[...hist].sort((a,b)=>a.date.localeCompare(b.date));
  let v=s[0].index;
  for(const h of s){if(h.date<=ymStr)v=h.index;else break;}
  return v;
}
const round=n=>Math.round(n*100)/100;

// מחשב לוח סילוקין למסלול בודד
function buildTrackSchedule(track,startDate,cpiHist){
  const fakeLoan={
    loanType:track.trackType,
    principal:track.principal,
    annualRate:track.rate,
    termMonths:track.term,
    startDate,
    spread:'0',
    primeHistory:[],
  };
  return buildSchedule(fakeLoan,cpiHist);
}

function buildSchedule(loan,cpiHist){
  // משכנתה מעורבת — מחבר את כל המסלולים לפי חודש
  if(loan.loanType==='משכנתה מעורבת'&&loan.tracks&&loan.tracks.length){
    const validTracks=loan.tracks.filter(t=>parseFloat(t.principal)>0&&parseInt(t.term)>0);
    if(!validTracks.length)return[];
    const maxTerm=Math.max(...validTracks.map(t=>parseInt(t.term)));
    const combined=[];
    for(let i=0;i<maxTerm;i++){
      let payment=0,interest=0,principal=0,balance=0;
      const pd=parseDate(loan.startDate);
      const d=pd?new Date(pd.y,pd.m-1+i):new Date();
      const ymNow=ym(d.getFullYear(),d.getMonth()+1);
      validTracks.forEach(t=>{
        const sched=buildTrackSchedule(t,loan.startDate,cpiHist);
        if(i<sched.length){
          payment+=sched[i].payment;
          interest+=sched[i].interest;
          principal+=sched[i].principal;
          balance+=sched[i].balance;
        }
      });
      combined.push({month:i+1,label:MONTHS[d.getMonth()]+' '+d.getFullYear(),
        ymStr:ymNow,date:new Date(d),
        interest:round(interest),principal:round(principal),
        payment:round(payment),balance:round(balance)});
    }
    return combined;
  }

  const pd=parseDate(loan.startDate);
  if(!pd)return[];
  const P=parseFloat(loan.principal)||0;
  let n=parseInt(loan.termMonths)||0;
  if(!n||!P)return[];
  const rate=parseFloat(loan.annualRate)||0,spread=parseFloat(loan.spread)||0;
  const earlyPayMode=loan.earlyPayMode||'shorten'; // 'shorten' | 'reduce'

  // בנה מפת פירעונות מוקדמים לפי חודש
  const earlyMap={};
  (loan.payments||[]).forEach(p=>{
    const k=p.date?p.date.slice(0,7):null;
    if(k)earlyMap[k]=(earlyMap[k]||0)+p.amount;
  });

  // פיגורים פעילים (עדיין לא שולמו) — משפיעים על הלוח
  const missedMap=new Set((loan.missedMonths||[]).map(m=>m.ymStr));

  // פיגורים ששולמו — הריבית שנצברה נוספת ליתרה בחודש שבו שולמו
  // resolvedMissed: [{ymStr, accruedInterest}]
  const resolvedMap={};
  (loan.resolvedMissed||[]).forEach(r=>{
    if(r.ymStr)resolvedMap[r.ymStr]=(resolvedMap[r.ymStr]||0)+(r.accruedInterest||0);
  });

  let bal=P;
  const rows=[];
  let curN=n;
  let curPmt=null;

  for(let i=0;i<curN;i++){
    if(bal<=0)break;
    const d=new Date(pd.y,pd.m-1+i);
    const ymNow=ym(d.getFullYear(),d.getMonth()+1);
    const isMissedMonth=missedMap.has(ymNow);

    // פירעון מוקדם — מפחית מהקרן לפני חישוב החודש
    let earlyPay=0;
    if(earlyMap[ymNow]&&earlyMap[ymNow]>0){
      earlyPay=Math.min(earlyMap[ymNow],bal);
      bal=round(Math.max(0,bal-earlyPay));
      if(bal<=0){
        rows.push({month:i+1,label:MONTHS[d.getMonth()]+' '+d.getFullYear(),
          ymStr:ymNow,date:new Date(d),
          interest:0,principal:earlyPay,payment:earlyPay,balance:0,
          earlyPay,closed:true});
        break;
      }
      if(earlyPayMode==='shorten'){
        const remRate=loan.loanType==='פריים'
          ?(primeAt(loan.primeHistory||[],ymNow)+spread)/100/12
          :rate/100/12;
        if(remRate>0){
          const p=curPmt||pmt(P,rate,n);
          const newRem=Math.ceil(Math.log(p/(p-remRate*bal))/Math.log(1+remRate));
          curN=i+Math.max(1,newRem);
        }else{
          curN=i+Math.ceil(bal/(curPmt||pmt(P,rate,n)));
        }
      }else{
        const rem=curN-i;
        const r=loan.loanType==='פריים'
          ?(primeAt(loan.primeHistory||[],ymNow)+spread)/100/12
          :rate/100/12;
        curPmt=rem>0?(r===0?bal/rem:bal*(r*Math.pow(1+r,rem))/(Math.pow(1+r,rem)-1)):bal;
      }
    }

    let payment,interest,principal;
    if(loan.loanType==='פריים'){
      const r=(primeAt(loan.primeHistory||[],ymNow)+spread)/100/12;
      const rem=curN-i;
      const p2=curPmt||(rem<=0?bal:(r===0?bal/rem:bal*(r*Math.pow(1+r,rem))/(Math.pow(1+r,rem)-1)));
      interest=round(bal*r);
      // חודש מפוגר — ריבית נצברת אבל קרן לא משולמת
      if(isMissedMonth){principal=0;payment=0;}
      else{principal=i===curN-1?bal:round(Math.min(Math.max(0,p2-interest),bal));payment=round(interest+principal);}
    }else if(loan.loanType==='בלון'){
      const r=rate/100/12;
      interest=round(bal*r);
      if(isMissedMonth){principal=0;payment=0;}
      else{principal=i===curN-1?bal:0;payment=round(interest+principal);}
    }else if(loan.loanType==='צמוד מדד'){
      if(i>0){
        const prevD=new Date(pd.y,pd.m-1+i-1);
        const prevYM=ym(prevD.getFullYear(),prevD.getMonth()+1);
        const cp=cpiAt(cpiHist||[],prevYM),cn=cpiAt(cpiHist||[],ymNow);
        if(cp>0&&cn!==cp)bal=round(bal*(cn/cp));
      }
      const r=rate/100/12,rem=curN-i;
      const p2=curPmt||(rem<=0?bal:(r===0?bal/rem:bal*(r*Math.pow(1+r,rem))/(Math.pow(1+r,rem)-1)));
      interest=round(bal*r);
      if(isMissedMonth){principal=0;payment=0;}
      else{principal=i===curN-1?bal:round(Math.min(Math.max(0,p2-interest),bal));payment=round(interest+principal);}
    }else{
      const r=rate/100/12;
      const p2=curPmt||pmt(P,rate,n);
      interest=round(bal*r);
      if(isMissedMonth){principal=0;payment=0;}
      else{principal=i===curN-1?bal:round(Math.min(Math.max(0,p2-interest),bal));payment=round(interest+principal);}
    }
    // בחודש מפוגר — היתרה לא יורדת (הקרן נשארת + ריבית נצברת)
    // בחודש שפיגור ששולם — הוסף ריבית היסטורית ליתרה
    bal=isMissedMonth
      ?round(bal+interest)
      :round(Math.max(0,bal-principal));
    if(resolvedMap[ymNow])bal=round(bal+(resolvedMap[ymNow]||0));
    rows.push({month:i+1,label:MONTHS[d.getMonth()]+' '+d.getFullYear(),
      ymStr:ymNow,date:new Date(d),interest,principal,payment,balance:bal,
      earlyPay:earlyPay||0,missed:isMissedMonth});
  }
  return rows;
}
function curIdx(loan){
  const pd=parseDate(loan.startDate);
  if(!pd)return -1;
  const now=new Date(),n=parseInt(loan.termMonths)||1;
  // חודש לקיחה = חודש 0, תשלום ראשון = חודש 1 (חודש אחרי)
  // החודש הנוכחי ניתן לסימון — לכן לא מחסירים 1
  const monthsElapsed=(now.getFullYear()-pd.y)*12+(now.getMonth()-(pd.m-1));
  return Math.min(monthsElapsed,n-1);
}

function calcArrears(loan,cpi){
  const missed=loan.missedMonths||[];
  const penaltyRate=parseFloat(loan.penaltyRate)||0;
  const graceDays=parseInt(loan.graceDays!=null?loan.graceDays:14,10);
  const sched=buildSchedule(loan,cpi);
  if(!missed.length)return{total:0,penalty:0,principal:0,missedCount:0};
  const now=new Date();
  let totalMissed=0,totalPenalty=0;
  missed.forEach(m=>{
    const row=sched.find(r=>r.ymStr===m.ymStr);
    if(!row)return;
    totalMissed+=row.payment;
    if(penaltyRate>0){
      const dueDate=new Date(row.date);
      dueDate.setDate(dueDate.getDate()+graceDays);
      const daysOverdue=Math.max(0,Math.floor((now-dueDate)/86400000));
      // ריבית דריבית יומית אפקטיבית
      const dailyRate=Math.pow(1+(penaltyRate/100),1/365)-1;
      totalPenalty+=row.payment*(Math.pow(1+dailyRate,daysOverdue)-1);
    }
  });
  return{
    total:round(totalMissed+totalPenalty),
    penalty:round(totalPenalty),
    principal:round(totalMissed),
    missedCount:missed.length
  };
}

function stats(loan,cpi){
  const sched=buildSchedule(loan,cpi);
  const idx=curIdx(loan);
  const si=idx<0?0:Math.min(idx,sched.length-1);
  const row=sched[si];
  const arrears=calcArrears(loan,cpi);
  // היתרה מגיעה ישירות מהלוח — כולל השפעת פיגורים
  const balance=idx<0
    ?parseFloat(loan.principal)||0
    :Math.max(0,row?row.balance:0);
  const totalInt=sched.reduce((s,r)=>s+r.interest,0);
  const paidInt=idx<0?0:sched.slice(0,si+1).filter(r=>!r.missed).reduce((s,r)=>s+r.interest,0);
  const endDate=sched.length?sched[sched.length-1].date:null;
  const curPmt=row?row.payment:0;
  const monthsLeft=idx<0?sched.length:Math.max(0,sched.length-si-1);
  const totalEarly=sched.reduce((s,r)=>s+(r.earlyPay||0),0);
  return{sched,idx:si,balance,totalInt,paidInt,endDate,curPmt,monthsLeft,arrears,totalEarly};
}

function earlyCalc(loan,extra,cpi){
  const s=stats(loan,cpi);
  if(s.balance<=0||extra<=0)return null;
  const r=parseFloat(loan.annualRate)/100/12;
  let bal=s.balance,origInt=0;
  for(let i=0;i<s.monthsLeft;i++){const int=bal*r;origInt+=int;bal=Math.max(0,bal-(s.curPmt-int));}
  bal=s.balance;let newInt=0,newM=0;
  while(bal>0.01&&newM<600){const int=bal*r;newInt+=int;bal=Math.max(0,bal-(s.curPmt+extra-int));newM++;}
  const ned=new Date();ned.setDate(1);ned.setMonth(ned.getMonth()+newM);
  return{saved:Math.max(0,origInt-newInt),savedM:Math.max(0,s.monthsLeft-newM),newEnd:ned};
}

function el(tag,cls,attrs){
  const e=document.createElement(tag);
  if(cls)e.className=cls;
  if(attrs)for(const[k,v]of Object.entries(attrs)){
    if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
    else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  }
  return e;
}
function mk(tag,cls,txt,attrs){const e=el(tag,cls,attrs);if(txt!==undefined&&txt!==null)e.textContent=txt;return e;}
function div(cls,attrs){return el('div',cls,attrs);}
function add(parent,...children){children.flat().forEach(c=>{if(c!=null)parent.appendChild(typeof c==='string'?document.createTextNode(c):c);});return parent;}

function tag(color,text){
  const s=el('span','tag');s.textContent=text;
  s.style.background=color+'22';s.style.color=color;return s;
}
function statBox(lbl,val,sub,color){
  const d=div('stat-box');
  add(d,mk('p',null,lbl,{style:{margin:'0 0 4px',fontSize:'10px',color:'var(--text4)',fontWeight:'700',textTransform:'uppercase'}}));
  add(d,mk('p',null,val,{style:{margin:'0',fontSize:'18px',fontWeight:'800',color:color||'var(--text)'}}));
  if(sub)add(d,mk('p',null,sub,{style:{margin:'2px 0 0',fontSize:'11px',color:'var(--text3)'}}));
  return d;
}
function inputField(cls,attrs){return el('input',cls?'inp '+cls:'inp',attrs);}
function selectField(options,val){
  const s=el('select','inp');
  options.forEach(o=>{const op=el('option');op.value=op.textContent=o;if(o===val)op.selected=true;s.appendChild(op);});
  return s;
}
function btn(cls,text,handler,attrs){const b=mk('button',cls,text,attrs);if(handler)b.addEventListener('click',handler);return b;}
function lbl(text){return mk('label','field-lbl',text);}

function infoAlert(bg,border,color,html){
  const d=div(null,{style:{background:bg,border:'1px solid '+border,borderRadius:'14px',padding:'12px 14px',marginBottom:'12px'}});
  d.innerHTML=html;return d;
}

// ── Simulator Sheet ──
function openSimulatorSheet(){
  openSheet((sheet,close)=>{
    add(sheet,mk('h2',null,'📐 סימולטור',{style:{fontWeight:'800',fontSize:'20px',marginBottom:'6px'}}));
    add(sheet,mk('p',null,'בחר הלוואה ונסה תרחישים — ללא שמירה',{style:{fontSize:'12px',color:'var(--text4)',marginBottom:'16px'}}));

    if(!S.loans.length){
      add(sheet,mk('p',null,'אין הלוואות עדיין',{style:{textAlign:'center',color:'var(--text4)',padding:'30px 0'}}));
      add(sheet,btn('btn-ghost','סגור',close));
      return;
    }

    // בחירת הלוואה
    let selectedLoan=S.loans[0];
    const loanSel=div(null,{style:{display:'flex',flexWrap:'wrap',gap:'8px',marginBottom:'16px'}});
    S.loans.forEach(l=>{
      const b=btn(null,l.name,()=>{
        selectedLoan=l;
        loanSel.querySelectorAll('button').forEach(x=>x.style.cssText=inactiveStyle);
        b.style.cssText=activeStyle;
        runSim();
      },{style:{}});
      const activeStyle=`background:rgba(99,102,241,.25);border:1px solid var(--accent);color:var(--blue);border-radius:10px;padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer;`;
      const inactiveStyle=`background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:var(--text4);border-radius:10px;padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer;`;
      b.style.cssText=l===selectedLoan?activeStyle:inactiveStyle;
      add(loanSel,b);
    });
    add(sheet,loanSel);

    // סוג סימולציה
    let simMode='lump';
    const modeBtns=div('sched-view-btns',{style:{marginBottom:'14px'}});
    const btnLump=btn('sched-view-btn on','💰 פירעון חד פעמי',()=>{simMode='lump';btnLump.classList.add('on');btnMonthly.classList.remove('on');lumpWrap.style.display='block';monthlyWrap.style.display='none';runSim();});
    const btnMonthly=btn('sched-view-btn','📅 תוספת חודשית',()=>{simMode='monthly';btnMonthly.classList.add('on');btnLump.classList.remove('on');lumpWrap.style.display='none';monthlyWrap.style.display='block';runSim();});
    add(modeBtns,btnLump,btnMonthly);
    add(sheet,modeBtns);

    // שדות
    const lumpWrap=div();
    const lumpRow=div('g2',{style:{marginBottom:'10px'}});
    const lumpAmt=inputField(null,{type:'number',placeholder:'סכום ₪ (למשל 10,000)'});
    const lumpDate=inputField(null,{type:'month',value:new Date().toISOString().slice(0,7)});
    add(lumpRow,lumpAmt,lumpDate);
    add(lumpWrap,lbl('סכום פירעון'),lumpRow);
    add(sheet,lumpWrap);

    const monthlyWrap=div(null,{style:{display:'none'}});
    const monthlyAmt=inputField(null,{type:'number',placeholder:'תוספת חודשית ₪'});
    add(monthlyWrap,lbl('תוספת חודשית קבועה'),monthlyAmt,
      mk('p',null,'כמה תוסיף מעל התשלום הקבוע כל חודש',{style:{fontSize:'11px',color:'var(--text4)',marginTop:'4px',marginBottom:'10px'}}));
    add(sheet,monthlyWrap);

    const simResult=div();
    add(sheet,simResult);

    function runSim(){
      simResult.innerHTML='';
      const loan=selectedLoan;

      // חשב מהיתרה הנוכחית לפי הלוח האמיתי
      const s=stats(loan,S.cpi);
      const curBal=s.balance;
      const curPmt=s.curPmt;
      const rate=parseFloat(loan.annualRate)||0;
      const r=rate/100/12;

      // חשב ריבית שנשארה מהיום — לפי הלוח מהחודש הנוכחי ואילך
      const fullSched=s.sched;
      const fromNow=fullSched.slice(s.idx);
      const origRemainingInt=round(fromNow.reduce((a,row)=>a+row.interest,0));
      const monthsLeft=fromNow.length;
      const origEnd=s.endDate;

      let simRemainingInt,simMonthsLeft,simEnd,invested;

      if(simMode==='lump'){
        const amt=parseFloat(lumpAmt.value)||0;
        if(!amt){add(simResult,mk('p',null,'הזן סכום פירעון',{style:{fontSize:'12px',color:'var(--text4)',textAlign:'center',padding:'16px 0'}}));return;}
        // הפחת מהיתרה הנוכחית
        const newBal=round(Math.max(0,curBal-amt));
        if(newBal<=0){
          simResult.innerHTML='';
          const box=div(null,{style:{background:'rgba(74,222,128,.08)',border:'1px solid rgba(74,222,128,.25)',borderRadius:'14px',padding:'16px',marginTop:'8px',textAlign:'center'}});
          add(box,mk('p',null,'🎉 ההלוואה נסגרת לגמרי!',{style:{fontSize:'16px',fontWeight:'900',color:'var(--green)',margin:'0 0 8px'}}));
          add(box,mk('p',null,'חיסכון של '+ils(origRemainingInt)+' בריבית',{style:{fontSize:'14px',color:'var(--green)'}}));
          add(simResult,box);return;
        }
        // חשב ריבית נשארת אחרי הפירעון
        let newBal2=newBal,newInt=0,newM=0;
        while(newBal2>0.01&&newM<600){
          const int=round(newBal2*r);
          const prin=newM===monthsLeft-1?newBal2:round(Math.min(curPmt-int,newBal2));
          if(prin<=0)break;
          newInt+=int;newBal2=round(Math.max(0,newBal2-prin));newM++;
        }
        simRemainingInt=round(newInt);simMonthsLeft=newM;invested=amt;
        const ned=new Date();ned.setDate(1);ned.setMonth(ned.getMonth()+newM);simEnd=ned;
      }else{
        const extra=parseFloat(monthlyAmt.value)||0;
        if(!extra){add(simResult,mk('p',null,'הזן תוספת חודשית',{style:{fontSize:'12px',color:'var(--text4)',textAlign:'center',padding:'16px 0'}}));return;}
        const newPmt=curPmt+extra;
        let bal2=curBal,newInt=0,newM=0;
        while(bal2>0.01&&newM<600){
          const int=round(bal2*r);
          const prin=round(Math.min(newPmt-int,bal2));
          if(prin<=0)break;
          newInt+=int;bal2=round(Math.max(0,bal2-prin));newM++;
        }
        simRemainingInt=round(newInt);simMonthsLeft=newM;invested=extra;
        const ned=new Date();ned.setDate(1);ned.setMonth(ned.getMonth()+newM);simEnd=ned;
      }

      const savedM=monthsLeft-simMonthsLeft;
      const savedInt=round(origRemainingInt-simRemainingInt);

      if(savedM<=0&&savedInt<=0){add(simResult,mk('p',null,'אין השפעה משמעותית',{style:{fontSize:'12px',color:'var(--text4)',textAlign:'center',padding:'16px 0'}}));return;}

      const box=div(null,{style:{background:'linear-gradient(135deg,rgba(99,102,241,.1),rgba(139,92,246,.06))',border:'1px solid rgba(99,102,241,.25)',borderRadius:'16px',padding:'16px',marginTop:'8px'}});
      add(box,mk('p',null,'📊 מהיום ואילך — '+loan.name,{style:{fontSize:'13px',fontWeight:'800',color:'var(--blue)',margin:'0 0 14px'}}));

      const grid=div(null,{style:{display:'grid',gridTemplateColumns:'1fr 24px 1fr',gap:'6px',alignItems:'center',marginBottom:'14px'}});
      const before=div(null,{style:{background:'rgba(0,0,0,.25)',borderRadius:'12px',padding:'10px',textAlign:'center'}});
      add(before,
        mk('p',null,'ללא שינוי',{style:{fontSize:'10px',color:'var(--text4)',margin:'0 0 4px',fontWeight:'700'}}),
        mk('p',null,ils(origRemainingInt),{style:{fontSize:'13px',fontWeight:'900',color:'var(--orange)',margin:'0 0 3px'}}),
        mk('p',null,monthsLeft+' חודשים',{style:{fontSize:'11px',color:'var(--text4)',margin:'0 0 2px'}}),
        mk('p',null,fmtMY(origEnd),{style:{fontSize:'10px',color:'var(--text4)',margin:'0'}}));
      const after=div(null,{style:{background:'rgba(74,222,128,.08)',borderRadius:'12px',padding:'10px',textAlign:'center',border:'1px solid rgba(74,222,128,.2)'}});
      add(after,
        mk('p',null,'אחרי שינוי ✓',{style:{fontSize:'10px',color:'var(--green)',margin:'0 0 4px',fontWeight:'700'}}),
        mk('p',null,ils(simRemainingInt),{style:{fontSize:'13px',fontWeight:'900',color:'var(--green)',margin:'0 0 3px'}}),
        mk('p',null,simMonthsLeft+' חודשים',{style:{fontSize:'11px',color:'var(--green)',margin:'0 0 2px'}}),
        mk('p',null,fmtMY(simEnd),{style:{fontSize:'10px',color:'var(--green)',margin:'0'}}));
      add(grid,before,mk('span',null,'→',{style:{textAlign:'center',color:'var(--green)',fontWeight:'900',fontSize:'16px'}}),after);
      add(box,grid);

      const sg=div('g2',{style:{marginBottom:'10px'}});
      if(savedM>0)add(sg,statBox('קיצור תקופה',savedM+' חודשים','חודשים שלא תשלם','var(--green)'));
      if(savedInt>0)add(sg,statBox('חיסכון בריבית',ils(savedInt),'מתוך הריבית שנשארה','var(--green)'));
      if(sg.children.length)add(box,sg);

      // ── מד כדאיות ──
      if(invested>0&&savedInt>0){
        const roiPct=round(savedInt/invested*100);
        // צבע לפי כדאיות
        let worthColor,worthLabel,worthMsg;
        if(roiPct>=50){worthColor='var(--green)';worthLabel='כדאי מאוד ✅';worthMsg='פירעון מוקדם עכשיו שווה הרבה — עדיין בחצי הראשון של ההלוואה';}
        else if(roiPct>=20){worthColor='var(--yellow)';worthLabel='כדאי בינוני ⚠️';worthMsg='יש חיסכון אבל לא מרבי — חלק גדול מהריבית כבר שולם';}
        else{worthColor='var(--orange)';worthLabel='כדאיות נמוכה 📉';worthMsg='רוב הריבית כבר שולמה — הפירעון חוסך מעט יחסית לסכום';}

        const meter=div(null,{style:{background:'rgba(255,255,255,.04)',borderRadius:'12px',padding:'12px',marginBottom:'10px'}});
        const meterTop=div('row-between',{style:{marginBottom:'8px'}});
        add(meterTop,
          mk('span',null,'מד כדאיות פירעון',{style:{fontSize:'12px',color:'var(--text4)',fontWeight:'700'}}),
          mk('span',null,worthLabel,{style:{fontSize:'12px',fontWeight:'800',color:worthColor}}));
        const track=div(null,{style:{height:'8px',background:'rgba(255,255,255,.06)',borderRadius:'10px',overflow:'hidden',marginBottom:'8px'}});
        add(track,div(null,{style:{height:'100%',width:Math.min(100,roiPct*2)+'%',background:worthColor,borderRadius:'10px',transition:'width .6s'}}));
        add(meter,meterTop,track);
        add(meter,mk('p',null,worthMsg,{style:{fontSize:'11px',color:'var(--text4)',lineHeight:'1.5'}}));

        // ROI
        const roiPer1000=round(savedInt/invested*1000);
        const tip=div(null,{style:{background:'rgba(99,102,241,.08)',borderRadius:'10px',padding:'10px',fontSize:'12px',color:'var(--blue)',marginTop:'6px'}});
        tip.innerHTML=`💡 על כל <strong>₪1,000</strong> שתשלם — תחסוך <strong>${ils(roiPer1000)}</strong> בריבית`;
        add(meter,tip);
        add(box,meter);
      }

      if(simMode==='lump'){
        const applyBtn=btn('btn-primary','✅ החל פירעון זה באמת',()=>{
          const amt=parseFloat(lumpAmt.value),dt=lumpDate.value;
          const updated=S.loans.map(l=>l.id===loan.id?{...l,payments:[...(l.payments||[]),{amount:amt,date:dt}]}:l);
          setLoans(updated,loan.id);close();
        });
        applyBtn.style.marginTop='10px';
        add(box,applyBtn);
      }
      add(simResult,box);
    }

    [lumpAmt,lumpDate,monthlyAmt].forEach(i=>i.addEventListener('input',runSim));
    runSim();

    add(sheet,div(null,{style:{height:'10px'}}));
    add(sheet,btn('btn-ghost','סגור',close));
  });
}

      dInp.value='';vInp.value='';buildList();
    }));
    addRow.lastChild.style.cssText='width:auto;padding:0 18px;border-radius:12px;height:48px';
    const btns=div('row',{style:{gap:'10px'}});
    add(btns,
      btn('btn-primary','שמור',()=>{S.cpi=hist;save();close();render();}),
      btn('btn-ghost','ביטול',close));
    btns.firstChild.style.flex='2';btns.lastChild.style.flex='1';
    add(sheet,addRow,btns);
  });
}

// ── Loan Form Sheet ──
function openLoanSheet(editLoan){
  openSheet((sheet,close)=>{
    let loanType=editLoan?editLoan.loanType:'שפיצר';
    const isMixed=()=>loanType==='משכנתה מעורבת';
    const isPrimeNow=()=>loanType==='פריים';

    const nInp =inputField(null,{type:'text',   placeholder:'הלוואת רכב',value:editLoan?editLoan.name:''});
    const pInp =inputField(null,{type:'number', placeholder:'100000',   value:editLoan&&!isMixed()?editLoan.principal:''});
    const rInp =inputField(null,{type:'number', step:'0.1',placeholder:'5.5',value:editLoan&&!isPrimeNow()&&!isMixed()?editLoan.annualRate:''});
    const sInp =inputField(null,{type:'number', step:'0.1',placeholder:'1.5',value:editLoan?editLoan.spread||'':''});
    const tInp =inputField(null,{type:'number', placeholder:'60',       value:editLoan&&!isMixed()?editLoan.termMonths:''});
    const dtInp=inputField(null,{type:'month',                          value:editLoan?editLoan.startDate.slice(0,7):new Date().toISOString().slice(0,7)});
    const typeSelect=selectField(TYPES,loanType);
    const penInp=inputField(null,{type:'number',step:'0.1',placeholder:'למשל: 12',value:editLoan?editLoan.penaltyRate||'':''});
    const graceInp=inputField(null,{type:'number',min:0,step:1,placeholder:'14',value:editLoan!=null?(editLoan.graceDays!=null?editLoan.graceDays:'14'):'14'});

    const rateRow=div();const spreadRow=div();
    const cpiNote=infoAlert('rgba(16,185,129,.08)','rgba(16,185,129,.2)','#10b981','<p style="margin:0;font-size:12px;color:#10b981">📊 הלוואה צמודת מדד — עדכן מדד חודשי לאחר שמירה</p>');
    const prevBox=div(null,{style:{background:'rgba(99,102,241,.1)',border:'1px solid rgba(99,102,241,.2)',borderRadius:'14px',padding:'14px',marginTop:'14px',textAlign:'center',display:'none'}});

    // ── מסלולי משכנתה מעורבת ──
    const TRACK_TYPES=['שפיצר','פריים','צמוד מדד','בלון'];
    const DEFAULT_TRACKS=[
      {trackType:'שפיצר',   principal:'',rate:'',term:''},
      {trackType:'פריים',   principal:'',rate:'',term:''},
      {trackType:'צמוד מדד',principal:'',rate:'',term:''},
    ];
    let tracks=(editLoan&&editLoan.tracks&&editLoan.tracks.length)
      ? editLoan.tracks.map(t=>({...t}))
      : DEFAULT_TRACKS.map(t=>({...t}));

    const mixedWrap=div(null,{style:{display:'none',marginTop:'14px'}});
    const tracksContainer=div();

    function buildTrackRow(t,idx){
      const row=div(null,{style:{
        background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,255,255,.08)',
        borderRadius:'14px',padding:'14px',marginBottom:'10px',position:'relative'
      }});
      const header=div('row-between',{style:{marginBottom:'10px'}});
      const trackSel=selectField(TRACK_TYPES,t.trackType);
      trackSel.style.cssText='flex:1;margin-left:8px;font-size:13px;padding:6px 10px;height:auto';
      trackSel.addEventListener('change',()=>{tracks[idx].trackType=trackSel.value;updateMixedPreview();});
      const delBtn=btn(null,'✕',()=>{tracks.splice(idx,1);renderTracks();});
      delBtn.style.cssText='background:rgba(239,68,68,.12);border:none;color:var(--red);border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:13px;flex-shrink:0';
      add(header,mk('span',null,'מסלול '+(idx+1),{style:{fontSize:'13px',fontWeight:'800',color:'var(--text2)'}}));
      const hRight=div('row',{style:{gap:'6px'}});
      add(hRight,trackSel,delBtn);
      add(header,hRight);
      add(row,header);

      const g=div('g3');
      const pI=inputField(null,{type:'number',placeholder:'קרן ₪',value:t.principal||''});
      pI.style.fontSize='13px';
      const rI=inputField(null,{type:'number',step:'0.1',placeholder:'ריבית %',value:t.rate||''});
      rI.style.fontSize='13px';
      const tI=inputField(null,{type:'number',placeholder:'חודשים',value:t.term||''});
      tI.style.fontSize='13px';
      [pI,rI,tI].forEach(inp=>inp.addEventListener('input',()=>{
        tracks[idx].principal=pI.value;
        tracks[idx].rate=rI.value;
        tracks[idx].term=tI.value;
        updateMixedPreview();
      }));
      add(g,pI,rI,tI);
      add(row,g);
      return row;
    }

    function renderTracks(){
      tracksContainer.innerHTML='';
      tracks.forEach((t,i)=>add(tracksContainer,buildTrackRow(t,i)));
      updateMixedPreview();
    }

    const addTrackBtn=btn(null,'＋ הוסף מסלול',()=>{
      tracks.push({trackType:'שפיצר',principal:'',rate:'',term:''});
      renderTracks();
    });
    addTrackBtn.style.cssText='width:100%;background:rgba(99,102,241,.1);border:1px dashed rgba(99,102,241,.4);color:var(--blue);border-radius:12px;padding:10px;cursor:pointer;font-size:13px;font-weight:700;margin-top:4px';

    const mixedPreview=div(null,{style:{background:'rgba(99,102,241,.08)',border:'1px solid rgba(99,102,241,.2)',borderRadius:'12px',padding:'12px',marginTop:'10px',display:'none'}});

    function updateMixedPreview(){
      mixedPreview.innerHTML='';
      let totalP=0,totalPmt=0,valid=0;
      tracks.forEach(t=>{
        const p=parseFloat(t.principal)||0,r=parseFloat(t.rate)||0,n=parseInt(t.term)||0;
        if(p>0&&n>0){totalP+=p;totalPmt+=pmt(p,r,n);valid++;}
      });
      if(valid>0){
        mixedPreview.style.display='block';
        add(mixedPreview,
          mk('p',null,'סה"כ קרן: '+ils(totalP),{style:{fontSize:'13px',fontWeight:'700',color:'var(--text2)',margin:'0 0 4px'}}),
          mk('p',null,'תשלום חודשי משולב: '+ils2(totalPmt),{style:{fontSize:'18px',fontWeight:'900',color:'var(--blue)',margin:'0'}}));
      }else{mixedPreview.style.display='none';}
    }

    add(mixedWrap,
      mk('p',null,'🏠 מסלולי המשכנתה',{style:{fontSize:'13px',fontWeight:'800',color:'var(--text2)',marginBottom:'10px'}}),
      tracksContainer,addTrackBtn,mixedPreview);

    // ── שדות רגילים (לא מעורבת) ──
    const regularFields=div();
    const twoCol=div('g2',{style:{marginTop:'14px'}});
    const c1=div();add(c1,lbl('תקופה (חודשים)'),tInp);
    const c2=div();add(c2,lbl('חודש תחילה'),dtInp);
    add(twoCol,c1,c2);
    add(regularFields,lbl('קרן (₪)'),pInp,rateRow,spreadRow,twoCol,cpiNote,prevBox);

    // שדה תאריך עצמאי למעורבת
    const mixedDateRow=div(null,{style:{marginTop:'14px',display:'none'}});
    const dtInp2=inputField(null,{type:'month',value:editLoan?editLoan.startDate.slice(0,7):new Date().toISOString().slice(0,7)});
    add(mixedDateRow,lbl('חודש תחילת המשכנתה'),dtInp2);

    function updatePreview(){
      if(isMixed())return;
      const P=parseFloat(pInp.value)||0,n=parseInt(tInp.value)||0;
      const baseRate=isPrimeNow()?(primeAt(editLoan&&editLoan.primeHistory||[],dtInp.value.slice(0,7))+parseFloat(sInp.value||0)):parseFloat(rInp.value)||0;
      if(P>0&&n>0&&baseRate>=0&&parseDate(dtInp.value)){
        prevBox.style.display='block';prevBox.innerHTML='';
        add(prevBox,mk('p',null,'תשלום חודשי משוער',{style:{fontSize:'12px',color:'#818cf8',margin:'0 0 4px'}}),
          mk('p',null,ils2(pmt(P,baseRate,n)),{style:{fontSize:'26px',fontWeight:'900',color:'#a5b4fc',margin:'0'}}));
      }else{prevBox.style.display='none';}
    }

    function refreshType(){
      const mixed=isMixed(),prime=isPrimeNow();
      regularFields.style.display=mixed?'none':'block';
      mixedWrap.style.display=mixed?'block':'none';
      mixedDateRow.style.display=mixed?'block':'none';
      rateRow.style.display=prime?'none':'block';
      spreadRow.style.display=prime?'block':'none';
      cpiNote.style.display=loanType==='צמוד מדד'?'block':'none';
      if(mixed)renderTracks();
      updatePreview();
    }

    const typeDescriptions={
      'שפיצר':         'תשלום חודשי קבוע — הנפוץ ביותר. בהתחלה משלמים יותר ריבית, בסוף יותר קרן.',
      'פריים':         'ריבית משתנה לפי ריבית בנק ישראל. זול כשהריבית נמוכה, מסוכן כשהיא עולה.',
      'בלון':          'משלמים רק ריבית כל חודש. כל הקרן חוזרת בתשלום אחד בסוף — סיכון גבוה.',
      'צמוד מדד':     'הקרן והריבית צמודות למדד המחירים. הסכום עולה עם האינפלציה.',
      'משכנתה מעורבת':'הזן כל מסלול בנפרד — הקרן, הריבית והתקופה של כל חלק.',
    };
    const typeDesc=mk('p',null,typeDescriptions[loanType]||'',{style:{
      fontSize:'12px',color:'#818cf8',marginTop:'7px',lineHeight:'1.6',
      background:'rgba(99,102,241,.08)',borderRadius:'10px',padding:'8px 12px',
      borderRight:'3px solid var(--accent)'}});

    typeSelect.addEventListener('change',()=>{
      loanType=typeSelect.value;
      typeDesc.textContent=typeDescriptions[loanType]||'';
      refreshType();
    });
    [nInp,pInp,rInp,sInp,tInp,dtInp].forEach(i=>i.addEventListener('input',updatePreview));

    add(rateRow,lbl('ריבית שנתית (%)'),rInp);
    add(spreadRow,lbl('מרווח מעל פריים (%)'),sInp,
      mk('p',null,'ריבית הפריים תוזן דרך כפתור 📈 בכרטיס',{style:{fontSize:'11px',color:'var(--text4)',marginTop:'4px'}}));

    add(sheet,
      mk('h2',null,editLoan?'עריכת הלוואה':'הלוואה חדשה',{style:{fontWeight:'800',fontSize:'20px',marginBottom:'18px'}}),
      lbl('שם'),nInp,lbl('סוג הלוואה'),typeSelect,typeDesc,
      regularFields,mixedWrap,mixedDateRow,
      lbl('ריבית פיגורים שנתית % (אופציונלי)'),penInp,
      lbl('ימי חסד לפני תחילת חיוב פיגורים'),graceInp,
      mk('p',null,'ברירת מחדל: 14 יום — כמו ברוב הבנקים',{style:{fontSize:'11px',color:'var(--text4)',marginTop:'4px'}}));

    refreshType();

    const btns=div('row mt20',{style:{gap:'10px'}});
    const saveB=btn('btn-primary',editLoan?'שמור שינויים':'הוסף הלוואה',()=>{
      const name=nInp.value.trim();
      const startDate=(isMixed()?dtInp2:dtInp).value;
      if(!name||!parseDate(startDate))return;

      let loan;
      if(isMixed()){
        // וולידציה: לפחות מסלול אחד תקין
        const validTracks=tracks.filter(t=>parseFloat(t.principal)>0&&parseInt(t.term)>0);
        if(!validTracks.length)return;
        const totalPrincipal=validTracks.reduce((s,t)=>s+parseFloat(t.principal),0);
        const maxTerm=Math.max(...validTracks.map(t=>parseInt(t.term)));
        loan={
          id:editLoan?editLoan.id:Date.now(),name,loanType:'משכנתה מעורבת',
          principal:String(totalPrincipal),
          annualRate:'0',termMonths:String(maxTerm),startDate,
          tracks:validTracks,
          penaltyRate:penInp.value||'',graceDays:graceInp.value.trim()||'14',
          primeHistory:editLoan?editLoan.primeHistory:[],
          payments:editLoan?editLoan.payments:[],
          missedMonths:editLoan?editLoan.missedMonths||[]:[]
        };
      }else{
        const principal=pInp.value,termMonths=tInp.value;
        const annualRate=isPrimeNow()?sInp.value:rInp.value;
        if(!parseFloat(principal)||!parseInt(termMonths))return;
        loan={
          id:editLoan?editLoan.id:Date.now(),name,loanType,principal,annualRate,
          spread:isPrimeNow()?sInp.value:'',termMonths,startDate,
          penaltyRate:penInp.value||'',graceDays:graceInp.value.trim()||'14',
          primeHistory:editLoan?editLoan.primeHistory:[],
          payments:editLoan?editLoan.payments:[],
          missedMonths:editLoan?editLoan.missedMonths||[]:[]
        };
      }
      const newLoans=editLoan?S.loans.map(l=>l.id===loan.id?loan:l):[...S.loans,loan];
      setLoans(newLoans,editLoan?loan.id:null);
      close();
    });
    add(btns,saveB,btn('btn-ghost','ביטול',close));
    saveB.style.flex='2';btns.lastChild.style.flex='1';
    add(sheet,btns);
  });
}

// ═══════════════════════════════════════════════════════════
//  EXPORT CSV — כולל נתוני פיגורים
// ═══════════════════════════════════════════════════════════
function exportCSV(){
  const rows=[['שם','סוג','קרן','ריבית','חודשים','יתרה','ריבית ששולמה','סה"כ ריבית','תשלום חודשי','חודשים נותרים','תאריך סיום','חודשים מפוגרים','קרן מפוגרת','ריבית פיגורים','סה"כ פיגורים']];
  S.loans.forEach(l=>{
    const s=stats(l,S.cpi);
    rows.push([l.name,l.loanType||'שפיצר',l.principal,l.annualRate+'%',l.termMonths,
      s.balance.toFixed(2),s.paidInt.toFixed(2),s.totalInt.toFixed(2),
      s.curPmt.toFixed(2),s.monthsLeft,s.endDate?s.endDate.toLocaleDateString('he-IL'):'',
      s.arrears.missedCount,s.arrears.principal.toFixed(2),s.arrears.penalty.toFixed(2),s.arrears.total.toFixed(2)]);
  });
  S.loans.forEach(l=>{
    rows.push([],[`לוח סילוקין - ${l.name}`],['חודש','תאריך','תשלום','ריבית','קרן','יתרה','סטטוס']);
    const missed=new Set((l.missedMonths||[]).map(m=>m.ymStr));
    const now=new Date();
    buildSchedule(l,S.cpi).forEach(r=>{
      const status=r.date>now?'עתידי':missed.has(r.ymStr)?'מפוגר':'שולם';
      rows.push([r.month,r.label,r.payment.toFixed(2),r.interest.toFixed(2),r.principal.toFixed(2),r.balance.toFixed(2),status]);
    });
  });
  const csv='\uFEFF'+rows.map(r=>r.map(v=>'"'+v+'"').join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download='הלוואות.csv';a.click();
}

// ═══════════════════════════════════════════════════════════
//  LOAN CARD
// ═══════════════════════════════════════════════════════════
function buildCard(loan,ci){
  const color=COLORS[ci%COLORS.length];
  const s=stats(loan,S.cpi);
  const progress=Math.min(100,((s.idx+1)/(parseInt(loan.termMonths)||1))*100);
  const isPrime=loan.loanType==='פריים';
  const isBalloon=loan.loanType==='בלון';
  const P=parseFloat(loan.principal)||1;

  const card=div('card',{style:{border:'1px solid '+color+'33'}});
  // FIX: שמור ID על הכרטיס לצורך refreshCard
  card.dataset.loanId=loan.id;

  // ── Header ──
  const hdr=div(null,{style:{padding:'18px 18px 0',borderBottom:'1px solid var(--border)'}});

  const topRow=div('row-between mb8');
  const titleBlock=div();
  const tagsRow=div('row mb8',{style:{flexWrap:'wrap',gap:'6px'}});
  add(tagsRow,tag(color,loan.loanType||'שפיצר'));
  if(isPrime){const cp=primeAt(loan.primeHistory||[],nowYM());add(tagsRow,tag('#f59e0b','פריים '+cp+'%'));}
  add(titleBlock,tagsRow,
    mk('h3',null,loan.name,{style:{fontSize:'20px',fontWeight:'900',margin:'0 0 3px',color:'var(--text)'}}),
    mk('p',null,(isPrime?'מרווח '+loan.annualRate+'%':loan.annualRate+'% שנתי')+' · '+loan.termMonths+' ח׳ · '+loan.startDate.slice(0,7),
      {style:{fontSize:'12px',color:'var(--text4)',margin:'0'}}));

  const acts=div('row',{style:{gap:'6px',flexShrink:'0'}});
  if(isPrime){
    const pb=el('button','btn-icon');pb.textContent='📈';pb.title='עדכן פריים';
    pb.style.background='rgba(245,158,11,.12)';pb.style.color='#f59e0b';
    pb.addEventListener('click',()=>openPrimeSheet(loan));add(acts,pb);
  }
  const eb=el('button','btn-icon');eb.textContent='✏️';eb.style.color='var(--text2)';eb.addEventListener('click',()=>openLoanSheet(loan));add(acts,eb);
  const db=el('button','btn-icon');db.textContent='✕';db.style.color='var(--red)';db.style.background='rgba(239,68,68,.1)';
  db.addEventListener('click',()=>{if(confirm('למחוק את "'+loan.name+'"?'))setLoans(S.loans.filter(l=>l.id!==loan.id));});
  add(acts,db);
  add(topRow,titleBlock,acts);add(hdr,topRow);

  // Balance
  const balDiv=div(null,{style:{textAlign:'center',padding:'14px 0 18px'}});
  add(balDiv,
    mk('p',null,'יתרת חוב עכשיו',{style:{margin:'0 0 2px',fontSize:'11px',color:'var(--text4)',fontWeight:'700',letterSpacing:'2px',textTransform:'uppercase'}}),
    mk('p',null,ils(s.balance),{style:{margin:'0',fontSize:'42px',fontWeight:'900',letterSpacing:'-2px',lineHeight:'1',color:s.balance>P*.5?'var(--red)':'var(--green)'}}));
  const subLine=div('row',{style:{justifyContent:'center',gap:'12px',marginTop:'6px',fontSize:'12px',color:'var(--text4)',flexWrap:'wrap'}});
  const pmtSpan=mk('span',null,ils2(s.curPmt));pmtSpan.style.color=color;pmtSpan.style.fontWeight='700';
  const remSpan=mk('span',null,s.monthsLeft+' חודשים');remSpan.style.color='var(--yellow)';remSpan.style.fontWeight='700';
  add(subLine,mk('span',null,'תשלום: '),pmtSpan,mk('span',null,'·'),mk('span',null,'נותרו: '),remSpan);
  add(balDiv,subLine);add(hdr,balDiv);

  // Progress
  const progWrap=div('mb16');
  const progLbl=div('row-between smaller dim2 mb8');
  add(progLbl,mk('span',null,'חודש '+(s.idx+1)+' / '+loan.termMonths),mk('span',null,progress.toFixed(0)+'% הסתיים'));
  const track=div('prog-track');const fill=div('prog-fill');
  fill.style.width=progress+'%';fill.style.background='linear-gradient(90deg,'+color+','+color+'88)';
  add(track,fill);add(progWrap,progLbl,track);add(hdr,progWrap);

  // Tabs
  const tabsRow=div('tabs');
  const tabDefs=[['info','פרטים'],['sched','לוח סילוקין'],['sim','🧪 סימולטור'],['pays','תשלומים']];
  const panels={};const tabEls={};
  // FIX: שמור טאב פעיל לפי loan.id, ברירת מחדל = info
  const savedTab=S.activeTab[loan.id]||'info';
  tabDefs.forEach(([id,label])=>{
    const t=mk('button','tab',label);t.style.setProperty('--tab-c',color);
    if(id===savedTab)t.classList.add('on');
    t.addEventListener('click',()=>{
      S.activeTab[loan.id]=id;
      Object.values(tabEls).forEach(x=>x.classList.remove('on'));
      Object.values(panels).forEach(x=>x.style.display='none');
      t.classList.add('on');panels[id].style.display='block';
    });
    tabEls[id]=t;add(tabsRow,t);
  });
  add(hdr,tabsRow);add(card,hdr);

  // ── Panels ──
  const panelWrap=div(null,{style:{padding:'18px'}});

  // INFO
  const infoP=div(null,{style:{display:savedTab==='info'?'block':'none'}});
  const sg=div('g2 mb12');
  add(sg,statBox('קרן מקורית',ils(P),'','var(--text2)'),
    statBox('סה"כ ריבית',ils(s.totalInt),(s.totalInt/P*100).toFixed(1)+'% מהקרן','var(--orange)'),
    statBox('ריבית ששולמה',ils(s.paidInt),'','var(--yellow)'),
    statBox('תאריך סיום',fmtMY(s.endDate),'','var(--blue)'));
  add(infoP,sg);

  // פס ריבית — כמה אחוז מסך הריבית כבר שולם
  if(s.totalInt>0){
    const paidPct=Math.min(100,round(s.paidInt/s.totalInt*100));
    // חישוב אחוז ריבית עד אמצע התקופה
    const midIdx=Math.floor(s.sched.length/2);
    const midInt=round(s.sched.slice(0,midIdx).reduce((a,r)=>a+r.interest,0)/s.totalInt*100);
    const intBar=div(null,{style:{background:'rgba(255,255,255,.04)',borderRadius:'14px',padding:'12px 14px',marginBottom:'12px'}});
    const intBarTop=div('row-between',{style:{marginBottom:'8px'}});
    add(intBarTop,
      mk('span',null,'ריבית ששולמה',{style:{fontSize:'12px',color:'var(--text4)',fontWeight:'700'}}),
      mk('span',null,paidPct+'%',{style:{fontSize:'13px',fontWeight:'800',color:'var(--yellow)'}}));

      {style:{fontSize:'11px',color:'var(--text4)',marginTop:'8px',lineHeight:'1.5'}}));

  if(isBalloon)add(infoP,infoAlert('rgba(239,68,68,.08)','rgba(239,68,68,.2)','','<p style="margin:0;font-size:12px;color:var(--red)">⚠️ הלוואת בלון — הקרן ('+ils(P)+') תשולם בתשלום אחד בסוף התקופה</p>'));
  if(s.totalEarly>0)add(infoP,infoAlert('rgba(74,222,128,.08)','rgba(74,222,128,.2)','','<p style="margin:0;font-size:13px;color:var(--green)">✅ פירעונות מוקדמים: <strong>'+ils(s.totalEarly)+'</strong> — ראה טאב תשלומים</p>'));
