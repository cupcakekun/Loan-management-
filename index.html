  // SCHEDULE — toggle switches + accordion לפי שנה
  const schedP=div(null,{style:{display:savedTab==='sched'?'block':'none'}});
  // שמור מצב תצוגה (רשימה / שנה) ואיזה שנים פתוחות
  const schedState={view: S.schedView&&S.schedView[loan.id] ? S.schedView[loan.id] : 'year', openYears:{}};

  function doToggleMissed(ymStr,payment){
    const freshLoan=S.loans.find(l=>l.id===loan.id);
    if(!freshLoan)return;
    const freshMissed=new Set((freshLoan.missedMonths||[]).map(m=>m.ymStr));
    let mm=[...(freshLoan.missedMonths||[])];
    if(freshMissed.has(ymStr)){mm=mm.filter(m=>m.ymStr!==ymStr);}
    else{mm.push({ymStr,payment});}
    if(navigator.vibrate)navigator.vibrate(20);
    const updated=S.loans.map(l=>l.id===loan.id?{...l,missedMonths:mm}:l);
    setLoans(updated,loan.id);
  }

  function buildMonthRow(row,i,curIdx2,curMissed,paidMonths){
    const isCur=i===curIdx2,isPast=i<curIdx2,isFuture=!isPast&&!isCur;
    const isMissed=curMissed.has(row.ymStr);
    // שולם = סומן ידנית, לא מפוגר, לא עתידי
    const isPaid=paidMonths&&paidMonths.has(row.ymStr);
    const canToggle=isPast||isCur;

    const wrap=div('toggle-wrap'+(isMissed?' is-missed':isFuture?' is-future':isCur?' is-cur':''));
    if(isCur){wrap.style.setProperty('--cur-color',color+'18');wrap.style.setProperty('--cur-border',color+'44');}

    // שמאל: שם חודש + תאריך + תשלום
    const left=div(null,{style:{flex:'1',minWidth:0}});
    const topLine=div('row',{style:{gap:'6px',marginBottom:'3px'}});
    const monthLbl=mk('span',null,(isCur?'▶ ':'')+row.label,{style:{
      fontSize:'13px',fontWeight:isCur||isMissed?'800':'600',
      color:isMissed?'var(--red)':isCur?color:isPaid?'var(--green)':'var(--text)'}});
    add(topLine,monthLbl);
    if(isMissed)add(topLine,mk('span',null,'מפוגר',{style:{fontSize:'10px',fontWeight:'700',color:'var(--red)',background:'rgba(248,113,113,.15)',padding:'1px 6px',borderRadius:'6px'}}));
    if(isPaid&&!isMissed)add(topLine,mk('span',null,'✓ שולם',{style:{fontSize:'10px',fontWeight:'700',color:'var(--green)',background:'rgba(74,222,128,.12)',padding:'1px 6px',borderRadius:'6px'}}));
    if(row.earlyPay>0)add(topLine,mk('span',null,'💸 '+ils(row.earlyPay),{style:{fontSize:'10px',fontWeight:'700',color:'var(--green)',background:'rgba(74,222,128,.12)',padding:'1px 6px',borderRadius:'6px'}}));
    if(row.closed)add(topLine,mk('span',null,'✅ נסגר',{style:{fontSize:'10px',fontWeight:'700',color:'var(--green)',background:'rgba(74,222,128,.15)',padding:'1px 6px',borderRadius:'6px'}}));
    add(left,topLine);
    const botLine=div('row',{style:{gap:'10px',fontSize:'11px',color:'var(--text4)'}});
    add(botLine,
      mk('span',null,'תשלום: ',null),
      mk('span',null,ils(row.payment),{style:{color:isMissed?'var(--red)':'var(--blue)',fontWeight:'700'}}),
      mk('span',null,'·'),
      mk('span',null,'יתרה: '),
      mk('span',null,ils(row.balance),{style:{color:'var(--text2)'}}));
    if(loan.loanType==='צמוד מדד'&&i>0){
      const sched=buildSchedule(loan,S.cpi);
      const prevBal=sched[i-1]?sched[i-1].balance:0;
      if(row.balance+row.principal>prevBal+1){
        add(botLine,mk('span',null,'▲ הוצמד',{style:{fontSize:'10px',fontWeight:'700',color:'#10b981',background:'rgba(16,185,129,.12)',padding:'1px 6px',borderRadius:'6px'}}));
      }
    }
    add(left,botLine);
    add(wrap,left);

    // ימין: toggle switch — ירוק רק אם סומן ידנית
    const sw=div('sw'+(isMissed?' missed':isPaid?' on':''));
    if(isFuture)sw.style.opacity='0.3';
    add(wrap,sw);

    function updateRowDOM(w,s,state){
      w.className='toggle-wrap'+(state==='missed'?' is-missed':isCur?' is-cur':'');
      if(isCur){w.style.setProperty('--cur-color',color+'18');w.style.setProperty('--cur-border',color+'44');}
      if(s)s.className='sw'+(state==='paid'?' on':state==='missed'?' missed':'');
      const tl=w.querySelector('.row');
      if(tl){
        tl.querySelectorAll('[data-status]').forEach(e=>e.remove());
        if(state==='missed'){const t=mk('span',null,'מפוגר',{style:{fontSize:'10px',fontWeight:'700',color:'var(--red)',background:'rgba(248,113,113,.15)',padding:'1px 6px',borderRadius:'6px'}});t.dataset.status='1';tl.appendChild(t);}
        else if(state==='paid'){const t=mk('span',null,'✓ שולם',{style:{fontSize:'10px',fontWeight:'700',color:'var(--green)',background:'rgba(74,222,128,.12)',padding:'1px 6px',borderRadius:'6px'}});t.dataset.status='1';tl.appendChild(t);}
        const lbl=tl.querySelector('span:first-child');
        if(lbl)lbl.style.color=state==='missed'?'var(--red)':state==='paid'?'var(--green)':isCur?color:'var(--text)';
      }
    }

    if(canToggle){
      wrap.addEventListener('click',()=>{
        const freshLoan=S.loans.find(l=>l.id===loan.id);
        if(!freshLoan)return;
        const freshPaid=new Set((freshLoan.paidMonths||[]).map(m=>m.ymStr));
        const freshMissed=new Set((freshLoan.missedMonths||[]).map(m=>m.ymStr));
        let pm=[...(freshLoan.paidMonths||[])];
        let mm=[...(freshLoan.missedMonths||[])];
        let newState;
        if(freshPaid.has(row.ymStr)){
          pm=pm.filter(m=>m.ymStr!==row.ymStr);
          mm.push({ymStr:row.ymStr,payment:row.payment});
          newState='missed';
        }else if(freshMissed.has(row.ymStr)){
          mm=mm.filter(m=>m.ymStr!==row.ymStr);
          pm.push({ymStr:row.ymStr,payment:row.payment});
          newState='paid';
        }else{
          pm.push({ymStr:row.ymStr,payment:row.payment});
          newState='paid';
        }
        S.loans=S.loans.map(l=>l.id===loan.id?{...l,paidMonths:pm,missedMonths:mm}:l);
        if(navigator.vibrate)navigator.vibrate(20);
        save();renderSummary();
        updateRowDOM(wrap,sw,newState);
      });
    }
    return wrap;
  }

  function rebuildSchedContent(currentLoan){
    schedP.innerHTML='';
    const curMissed=new Set((currentLoan.missedMonths||[]).map(m=>m.ymStr));
    const curPaid=new Set((currentLoan.paidMonths||[]).map(m=>m.ymStr));
    const curArrears=calcArrears(currentLoan,S.cpi);
    const curSched=buildSchedule(currentLoan,S.cpi);
    const curIdx2=curIdx(currentLoan);

    // תיבת פיגורים
    if(curMissed.size>0){
      const ab=div('arrears-box');
      add(ab,mk('p',null,'⚠️ פיגור תשלומים',{style:{fontSize:'14px',fontWeight:'800',color:'var(--red)',margin:'0 0 12px'}}));
      const ag=div('g2',{style:{marginBottom:'10px'}});
      add(ag,
        statBox('חודשים מפוגרים',curMissed.size+' חודשים','','var(--red)'),
        statBox('קרן מפוגרת',ils(curArrears.principal),'','var(--red)'));
      add(ab,ag);
      if(curArrears.penalty>0){
        add(ab,div(null,{style:{marginBottom:'8px'}}));
        add(ab,statBox('ריבית פיגורים שנצברה',ils(curArrears.penalty),'','var(--orange)'));
      }
      add(ab,div(null,{style:{marginBottom:'8px'}}));
      add(ab,statBox('סה"כ חוב פיגורים',ils(curArrears.total),'קרן + ריבית פיגורים','var(--red)'));
      add(schedP,ab);
    }

    // כפתורי תצוגה
    const viewBtns=div('sched-view-btns');
    const btnList=btn('sched-view-btn'+(schedState.view==='list'?' on':''),'📋 רשימה',()=>{
      schedState.view='list';
      if(!S.schedView)S.schedView={};
      S.schedView[loan.id]='list';
      rebuildSchedContent(S.loans.find(l=>l.id===loan.id)||currentLoan);
    });
    const btnYear=btn('sched-view-btn'+(schedState.view==='year'?' on':''),'📅 לפי שנה',()=>{
      schedState.view='year';
      if(!S.schedView)S.schedView={};
      S.schedView[loan.id]='year';
      rebuildSchedContent(S.loans.find(l=>l.id===loan.id)||currentLoan);
    });
    add(viewBtns,btnYear,btnList);
    add(schedP,viewBtns);

    add(schedP,mk('p',null,'לחץ על שורה לסימון כמפוגר / שולם',{style:{fontSize:'11px',color:'var(--text4)',marginBottom:'10px'}}));

    if(schedState.view==='list'){
      // תצוגת רשימה רגילה עם scroll
      const listWrap=div(null,{style:{maxHeight:'380px',overflowY:'auto'}});
      curSched.forEach((row,i)=>add(listWrap,buildMonthRow(row,i,curIdx2,curMissed,curPaid)));
      add(schedP,listWrap);
    } else {
      // תצוגת accordion לפי שנה
      const byYear={};
      curSched.forEach((row,i)=>{
        const y=row.date.getFullYear();
        if(!byYear[y])byYear[y]=[];
        byYear[y].push({row,i});
      });
      // פתח את השנה הנוכחית אוטומטית
      const nowYear=new Date().getFullYear();
      if(schedState.openYears[nowYear]===undefined)schedState.openYears[nowYear]=true;

      Object.keys(byYear).forEach(year=>{
        const entries=byYear[year];
        const isOpen=!!schedState.openYears[year];
        const missedInYear=entries.filter(({row})=>curMissed.has(row.ymStr)).length;
        const paidInYear=entries.filter(({row,i})=>!curMissed.has(row.ymStr)&&i<=curIdx2).length;
        const totalInYear=entries.length;

        const yrSec=div(null,{style:{marginBottom:'6px'}});
        const yrHdr=div('yr-hdr');

        const yrLeft=div('row',{style:{gap:'8px'}});
        add(yrLeft,mk('span',null,'שנת '+year,{style:{fontSize:'14px'}}));
        if(missedInYear>0){
          const badge=mk('span','yr-badge',missedInYear+' מפוגרים');
          badge.style.background='rgba(248,113,113,.15)';badge.style.color='var(--red)';
          add(yrLeft,badge);
        }
        add(yrLeft,mk('span',null,paidInYear+'/'+totalInYear,{style:{fontSize:'11px',color:'var(--text4)'}}));

        const arrow=mk('span',null,isOpen?'▲':'▼',{style:{fontSize:'12px',color:'var(--text4)'}});
        add(yrHdr,yrLeft,arrow);

        const yrBody=div(null,{style:{display:isOpen?'block':'none'}});
        entries.forEach(({row,i})=>add(yrBody,buildMonthRow(row,i,curIdx2,curMissed,curPaid)));

        yrHdr.addEventListener('click',()=>{
          schedState.openYears[year]=!schedState.openYears[year];
          yrBody.style.display=schedState.openYears[year]?'block':'none';
          arrow.textContent=schedState.openYears[year]?'▲':'▼';
        });
        add(yrSec,yrHdr,yrBody);
        add(schedP,yrSec);
      });
    }
  }

  rebuildSchedContent(loan);
  panels['sched']=schedP;

  // SIMULATOR
  const simP=div(null,{style:{display:savedTab==='sim'?'block':'none'}});

  function buildSimulator(){
    simP.innerHTML='';
    add(simP,mk('p',null,'נסה תרחישים שונים — ללא שמירה',{style:{fontSize:'12px',color:'var(--text4)',marginBottom:'14px'}}));

    // ── סוג סימולציה ──
    const simTypes=div('sched-view-btns',{style:{marginBottom:'14px'}});
    let simMode='lump'; // lump = חד פעמי, monthly = תוספת חודשית
    const btnLump=btn('sched-view-btn on','💰 פירעון חד פעמי',()=>{
      simMode='lump';btnLump.classList.add('on');btnMonthly.classList.remove('on');
      lumpWrap.style.display='block';monthlyWrap.style.display='none';runSim();
    });
    const btnMonthly=btn('sched-view-btn','📅 תוספת חודשית',()=>{
      simMode='monthly';btnMonthly.classList.add('on');btnLump.classList.remove('on');
      lumpWrap.style.display='none';monthlyWrap.style.display='block';runSim();
    });
    add(simTypes,btnLump,btnMonthly);
    add(simP,simTypes);

    // שדות פירעון חד פעמי
    const lumpWrap=div();
    const lumpRow=div('g2',{style:{marginBottom:'10px'}});
    const lumpAmt=inputField(null,{type:'number',placeholder:'סכום ₪ (למשל 10,000)'});
    const lumpDate=inputField(null,{type:'month',value:new Date().toISOString().slice(0,7)});
    add(lumpRow,lumpAmt,lumpDate);
    add(lumpWrap,lbl('סכום פירעון'),lumpRow);
    add(simP,lumpWrap);

    // שדות תוספת חודשית
    const monthlyWrap=div(null,{style:{display:'none'}});
    const monthlyAmt=inputField(null,{type:'number',placeholder:'תוספת חודשית ₪ (למשל 500)'});
    add(monthlyWrap,lbl('תוספת חודשית קבועה'),monthlyAmt,
      mk('p',null,'כמה תוסיף מעל התשלום הקבוע כל חודש',{style:{fontSize:'11px',color:'var(--text4)',marginTop:'4px',marginBottom:'10px'}}));
    add(simP,monthlyWrap);

    // תוצאות
    const simResult=div();
    add(simP,simResult);

    function runSim(){
      simResult.innerHTML='';
      const freshLoan=S.loans.find(l=>l.id===loan.id)||loan;

      // לוח בסיס — ללא שינויים
      const schedBase=buildSchedule({...freshLoan,payments:[],earlyPayMode:'shorten'},S.cpi);
      const origMonths=schedBase.length;
      const origInt=round(schedBase.reduce((s,r)=>s+r.interest,0));
      const origEnd=schedBase.length?schedBase[schedBase.length-1].date:null;
      const origPmt=schedBase[0]?schedBase[0].payment:0;

      let simLoan;
      if(simMode==='lump'){
        const amt=parseFloat(lumpAmt.value)||0;
        const dt=lumpDate.value;
        if(!amt||!dt){
          add(simResult,mk('p',null,'הזן סכום וחודש לסימולציה',{style:{fontSize:'12px',color:'var(--text4)',textAlign:'center',padding:'20px 0'}}));
          return;
        }
        simLoan={...freshLoan,payments:[{amount:amt,date:dt}],earlyPayMode:'shorten'};
      }else{
        const extra=parseFloat(monthlyAmt.value)||0;
        if(!extra){
          add(simResult,mk('p',null,'הזן תוספת חודשית לסימולציה',{style:{fontSize:'12px',color:'var(--text4)',textAlign:'center',padding:'20px 0'}}));
          return;
        }
        // סימולציה של תוספת חודשית — בונה לוח עם תשלום מוגדל
        const pd=parseDate(freshLoan.startDate);
        if(!pd)return;
        const P=parseFloat(freshLoan.principal)||0;
        const rate=parseFloat(freshLoan.annualRate)||0;
        const n=parseInt(freshLoan.termMonths)||0;
        const r=rate/100/12;
        const basePmt=pmt(P,rate,n);
        const newPmt=basePmt+extra;
        // חשב חודשים חדשים: ln(newPmt/(newPmt-r*P)) / ln(1+r)
        let newMonths=n;
        if(r>0&&newPmt>r*P){
          newMonths=Math.ceil(Math.log(newPmt/(newPmt-r*P))/Math.log(1+r));
        }
        // בנה לוח מקוצר
        let bal=P,newInt=0;
        const rows=[];
        for(let i=0;i<newMonths&&bal>0.01;i++){
          const interest=round(bal*r);
          const principal=i===newMonths-1?bal:round(Math.min(newPmt-interest,bal));
          bal=round(Math.max(0,bal-principal));
          newInt+=interest;
          const d=new Date(pd.y,pd.m-1+i);
          rows.push({date:new Date(d),balance:bal,interest,payment:round(interest+principal)});
        }
        const simEnd=rows.length?rows[rows.length-1].date:null;
        const simInt=round(newInt);
        const savedM=origMonths-rows.length;
        const savedInt=round(origInt-simInt);

        renderSimResults(simResult,{
          origMonths,origInt,origEnd,origPmt,
          newMonths:rows.length,newInt:simInt,newEnd:simEnd,newPmt:newPmt,
          savedM,savedInt,invested:extra,mode:'monthly'
        });
        return;
      }

      const schedSim=buildSchedule(simLoan,S.cpi);
      const simMonths=schedSim.length;
      const simInt=round(schedSim.reduce((s,r)=>s+r.interest,0));
      const simEnd=schedSim.length?schedSim[schedSim.length-1].date:null;
      const savedM=origMonths-simMonths;
      const savedInt=round(origInt-simInt);
      const invested=parseFloat(lumpAmt.value)||0;

      renderSimResults(simResult,{
        origMonths,origInt,origEnd,origPmt,
        newMonths:simMonths,newInt:simInt,newEnd:simEnd,newPmt:origPmt,
        savedM,savedInt,invested,mode:'lump'
      });
    }

    function renderSimResults(container,d){
      container.innerHTML='';
      if(d.savedM<=0&&d.savedInt<=0){
        add(container,mk('p',null,'אין השפעה משמעותית על ההלוואה',{style:{fontSize:'12px',color:'var(--text4)',textAlign:'center',padding:'16px 0'}}));
        return;
      }

      // כרטיס השוואה ראשי
      const box=div(null,{style:{
        background:'linear-gradient(135deg,rgba(99,102,241,.1),rgba(139,92,246,.06))',
        border:'1px solid rgba(99,102,241,.25)',borderRadius:'16px',padding:'16px',marginBottom:'12px'}});

      add(box,mk('p',null,'תוצאות הסימולציה',{style:{fontSize:'13px',fontWeight:'800',color:'var(--blue)',margin:'0 0 14px'}}));

      // השוואה לפני/אחרי
      const grid=div(null,{style:{display:'grid',gridTemplateColumns:'1fr 28px 1fr',gap:'6px',alignItems:'center',marginBottom:'14px'}});
      const before=div(null,{style:{background:'rgba(0,0,0,.25)',borderRadius:'12px',padding:'10px',textAlign:'center'}});
      add(before,
        mk('p',null,'עכשיו',{style:{fontSize:'10px',color:'var(--text4)',margin:'0 0 6px',fontWeight:'700',letterSpacing:'1px'}}),
        mk('p',null,ils(d.origInt),{style:{fontSize:'14px',fontWeight:'900',color:'var(--orange)',margin:'0 0 3px'}}),
        mk('p',null,d.origMonths+' חודשים',{style:{fontSize:'11px',color:'var(--text4)',margin:'0 0 3px'}}),
        mk('p',null,fmtMY(d.origEnd),{style:{fontSize:'10px',color:'var(--text4)',margin:'0'}}));

      add(grid,before,mk('span',null,'→',{style:{textAlign:'center',color:'var(--green)',fontWeight:'900',fontSize:'18px'}}));

      const after=div(null,{style:{background:'rgba(74,222,128,.08)',borderRadius:'12px',padding:'10px',textAlign:'center',border:'1px solid rgba(74,222,128,.2)'}});
      add(after,
        mk('p',null,'אחרי שינוי ✓',{style:{fontSize:'10px',color:'var(--green)',margin:'0 0 6px',fontWeight:'700',letterSpacing:'1px'}}),
        mk('p',null,ils(d.newInt),{style:{fontSize:'14px',fontWeight:'900',color:'var(--green)',margin:'0 0 3px'}}),
        mk('p',null,d.newMonths+' חודשים',{style:{fontSize:'11px',color:'var(--green)',margin:'0 0 3px'}}),
        mk('p',null,fmtMY(d.newEnd),{style:{fontSize:'10px',color:'var(--green)',margin:'0'}}));
      add(grid,after);
      add(box,grid);

      // תיבות חיסכון
      const sg=div('g2',{style:{marginBottom:'10px'}});
      if(d.savedM>0)add(sg,statBox('קיצור תקופה',d.savedM+' חודשים','חודשים שלא תשלם','var(--green)'));
      if(d.savedInt>0)add(sg,statBox('חיסכון בריבית',ils(d.savedInt),'כסף שנשאר לך','var(--green)'));
      add(box,sg);

      // ROI
      if(d.invested>0&&d.savedInt>0){
        const roi=round(d.savedInt/d.invested*100);
        add(box,div(null,{style:{
          background:'rgba(99,102,241,.08)',borderRadius:'10px',padding:'10px',
          fontSize:'12px',color:'var(--blue)',lineHeight:'1.6'}}));
        box.lastChild.innerHTML=`💡 על כל <strong>₪1,000</strong> שתשלם — תחסוך <strong>${ils(round(d.savedInt/d.invested*1000))}</strong> בריבית`;
      }
      add(container,box);

      // כפתור המרה לפירעון אמיתי
      if(d.mode==='lump'){
        const applyBtn=btn('btn-primary','✅ החל פירעון זה באמת',()=>{
          const freshLoan=S.loans.find(l=>l.id===loan.id);
          if(!freshLoan)return;
          const amt=d.invested,dt=lumpDate.value;
          const updated=S.loans.map(l=>l.id===loan.id
            ?{...l,payments:[...(l.payments||[]),{amount:amt,date:dt}]}:l);
          setLoans(updated,loan.id);
          S.activeTab[loan.id]='pays';
          refreshCard(loan.id);
        });
        applyBtn.style.marginTop='8px';
        add(container,applyBtn);
      }
    }

    [lumpAmt,lumpDate,monthlyAmt].forEach(i=>i.addEventListener('input',runSim));
    runSim();
  }

  buildSimulator();
  panels['sim']=simP;

  // PAYMENTS
  const paysP=div(null,{style:{display:savedTab==='pays'?'block':'none'}});
  function renderPays(){
    paysP.innerHTML='';
    const freshLoan=S.loans.find(l=>l.id===loan.id)||loan;
    const pmts=freshLoan.payments||[];
    const mode=freshLoan.earlyPayMode||'shorten';

    // toggle מצב פירעון
    const modeWrap=div(null,{style:{background:'rgba(255,255,255,.04)',borderRadius:'14px',padding:'12px 14px',marginBottom:'14px'}});
    add(modeWrap,mk('p',null,'אופן הפירעון המוקדם:',{style:{fontSize:'12px',color:'var(--text4)',marginBottom:'8px'}}));
    const modeBtns=div('row',{style:{gap:'6px'}});
    const mkModeBtn=(label,val,desc)=>{
      const b=btn(null,label,()=>{
        const updated=S.loans.map(l=>l.id===loan.id?{...l,earlyPayMode:val}:l);
        setLoans(updated,loan.id);
      });
      b.style.cssText=`flex:1;padding:8px 6px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid;transition:all .15s;`
        +(mode===val
          ?'background:rgba(99,102,241,.25);border-color:var(--accent);color:var(--blue);'
          :'background:transparent;border-color:rgba(255,255,255,.1);color:var(--text4);');
      const wrap=div(null,{style:{flex:'1',textAlign:'center'}});
      add(wrap,b,mk('p',null,desc,{style:{fontSize:'10px',color:'var(--text4)',marginTop:'3px'}}));
      return wrap;
    };
    add(modeBtns,
      mkModeBtn('✂️ קיצור תקופה','shorten','אותו תשלום, מסתיים מוקדם'),
      mkModeBtn('📉 הקטנת תשלום','reduce','אותה תקופה, פחות כל חודש'));
    add(modeWrap,modeBtns);
    add(paysP,modeWrap);

    // טופס הוספת פירעון
    const addWrap=div('row',{style:{gap:'8px',marginBottom:'14px'}});
    const amtInp=inputField(null,{type:'number',placeholder:'סכום ₪'});
    amtInp.style.flex='1';
    const dateInp=inputField(null,{type:'month',value:new Date().toISOString().slice(0,7)});
    dateInp.style.flex='1';
    const addBtn=btn(null,'+ הוסף',()=>{
      const v=parseFloat(amtInp.value);
      if(!isNaN(v)&&v>0&&dateInp.value){
        const updated=S.loans.map(l=>l.id===loan.id
          ?{...l,payments:[...(l.payments||[]),{amount:v,date:dateInp.value}]}:l);
        setLoans(updated,loan.id);
        amtInp.value='';
      }
    });
    addBtn.style.cssText='background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff;border-radius:12px;padding:0 16px;cursor:pointer;font-weight:800;font-size:14px;height:48px;white-space:nowrap';
    amtInp.addEventListener('keydown',e=>{if(e.key==='Enter')addBtn.click();});
    add(addWrap,amtInp,dateInp,addBtn);
    add(paysP,addWrap);

    if(!pmts.length){
      const ph=div('empty',{style:{padding:'20px 0'}});
      add(ph,mk('p',null,'💸',{style:{fontSize:'28px',margin:'0 0 8px'}}),
        mk('p',null,'הוסף פירעון מוקדם למעלה'),
        mk('p',null,'תראה כאן כמה זמן וכסף תחסוך',{style:{fontSize:'12px',color:'var(--text4)',marginTop:'4px'}}));
      add(paysP,ph);
    }else{
      // ── השוואה: עם פירעונות vs בלי ──
      const schedWith=buildSchedule(freshLoan,S.cpi);
      const schedWithout=buildSchedule({...freshLoan,payments:[],earlyPayMode:'shorten'},S.cpi);
      const origEnd=schedWithout.length?schedWithout[schedWithout.length-1].date:null;
      const newEnd=schedWith.length?schedWith[schedWith.length-1].date:null;
      const savedMonths=schedWithout.length-schedWith.length;
      const origInt=round(schedWithout.reduce((s,r)=>s+r.interest,0));
      const newInt=round(schedWith.reduce((s,r)=>s+r.interest,0));
      const savedInt=round(origInt-newInt);
      const totalEarlyPaid=round(pmts.reduce((s,p)=>s+(p.amount||0),0));

      const impBox=div(null,{style:{
        background:'linear-gradient(135deg,rgba(74,222,128,.08),rgba(16,185,129,.05))',
        border:'1px solid rgba(74,222,128,.25)',borderRadius:'16px',
        padding:'16px',marginBottom:'14px'}});

      add(impBox,mk('p',null,'📊 השפעת הפירעונות המוקדמים שלך',{style:{
        fontSize:'13px',fontWeight:'800',color:'var(--green)',margin:'0 0 14px'}}));

      // שורת השוואה: לפני vs אחרי
      const compareGrid=div(null,{style:{display:'grid',gridTemplateColumns:'1fr auto 1fr',gap:'8px',alignItems:'center',marginBottom:'14px'}});

      const colBefore=div(null,{style:{background:'rgba(0,0,0,.2)',borderRadius:'12px',padding:'10px',textAlign:'center'}});
      add(colBefore,
        mk('p',null,'ללא פירעון',{style:{fontSize:'10px',color:'var(--text4)',margin:'0 0 4px',fontWeight:'700'}}),
        mk('p',null,ils(origInt),{style:{fontSize:'15px',fontWeight:'900',color:'var(--orange)',margin:'0 0 4px'}}),
        mk('p',null,fmtMY(origEnd),{style:{fontSize:'11px',color:'var(--text4)',margin:'0'}}));

      const arrow=mk('span',null,'←',{style:{fontSize:'20px',color:'var(--green)',fontWeight:'900',textAlign:'center'}});

      const colAfter=div(null,{style:{background:'rgba(74,222,128,.08)',borderRadius:'12px',padding:'10px',textAlign:'center',border:'1px solid rgba(74,222,128,.2)'}});
      add(colAfter,
        mk('p',null,'עם פירעון ✓',{style:{fontSize:'10px',color:'var(--green)',margin:'0 0 4px',fontWeight:'700'}}),
        mk('p',null,ils(newInt),{style:{fontSize:'15px',fontWeight:'900',color:'var(--green)',margin:'0 0 4px'}}),
        mk('p',null,fmtMY(newEnd),{style:{fontSize:'11px',color:'var(--green)',margin:'0'}}));

      add(compareGrid,colBefore,arrow,colAfter);
      add(impBox,compareGrid);

      // תיבות חיסכון
      const savGrid=div('g2',{style:{marginBottom:'10px'}});
      if(savedMonths>0)add(savGrid,statBox('קיצור תקופה',savedMonths+' חודשים','זמן שחסכת','var(--green)'));
      if(savedInt>0)add(savGrid,statBox('חיסכון בריבית',ils(savedInt),'כסף שנשאר אצלך','var(--green)'));
      if(savGrid.children.length)add(impBox,savGrid);

      // ROI — כמה ריבית נחסכה על כל שקל שהושקע
      if(totalEarlyPaid>0&&savedInt>0){
        const roi=round(savedInt/totalEarlyPaid*100);
        add(impBox,mk('p',null,`💡 על כל ₪1 שפרעת מוקדם — חסכת ${roi > 100 ? ils(roi/100) : roi+'%'} בריבית`,
          {style:{fontSize:'11px',color:'#86efac',marginTop:'6px',padding:'6px 10px',
          background:'rgba(74,222,128,.06)',borderRadius:'8px'}}));
      }
      add(paysP,impBox);

      // רשימת פירעונות
      add(paysP,mk('p',null,'פירעונות שהוזנו:',{style:{fontSize:'12px',color:'var(--text4)',fontWeight:'700',marginBottom:'8px'}}));
      [...pmts].sort((a,b)=>b.date.localeCompare(a.date)).forEach((p,pi)=>{
        const realIdx=pmts.findIndex(x=>x.date===p.date&&x.amount===p.amount);
        const r=div('row-between',{style:{background:'rgba(255,255,255,.03)',borderRadius:'12px',padding:'12px 14px',marginBottom:'8px'}});
        const left=div();
        add(left,mk('span',null,ils2(p.amount),{style:{color:'var(--green)',fontSize:'16px',fontWeight:'800',display:'block'}}),
          mk('span',null,p.date,{style:{fontSize:'11px',color:'var(--text4)'}}));
        const delBtn=btn(null,'✕',()=>{
          const updated=S.loans.map(l=>l.id===loan.id
            ?{...l,payments:l.payments.filter((_,j)=>j!==realIdx)}:l);
          setLoans(updated,loan.id);
        });
        delBtn.style.cssText='background:rgba(239,68,68,.1);border:none;color:var(--red);border-radius:8px;padding:4px 10px;cursor:pointer;font-size:13px';
        add(r,left,delBtn);
        add(paysP,r);
      });
    }
  }
  renderPays();
  panels['pays']=paysP;

  add(panelWrap,...Object.values(panels));
  add(card,panelWrap);

  // FIX: refreshCard — בנה מחדש רק את הכרטיס הזה ב-DOM
  card._rebuildSched=(freshLoan)=>rebuildSchedContent(freshLoan);

  return card;
}

// ═══════════════════════════════════════════════════════════
//  REFRESH CARD — לא render() מלא, רק כרטיס ספציפי
// ═══════════════════════════════════════════════════════════
function refreshCard(loanId){
  const existingCard=document.querySelector(`[data-loan-id="${loanId}"]`);
  if(!existingCard)return render(); // fallback
  const freshLoan=S.loans.find(l=>l.id==loanId);
  if(!freshLoan)return render();
  const ci=S.loans.findIndex(l=>l.id==loanId);
  const newCard=buildCard(freshLoan,ci);
  existingCard.replaceWith(newCard);
  renderSummary();
}

// ═══════════════════════════════════════════════════════════
//  RENDER SUMMARY ONLY
// ═══════════════════════════════════════════════════════════
function renderSummary(){
  const sumEl=document.getElementById('summary-grid');
  if(!sumEl)return;
  const totals=S.loans.reduce((a,l)=>{const s=stats(l,S.cpi);return{b:a.b+s.balance,p:a.p+s.curPmt,i:a.i+s.totalInt};},{b:0,p:0,i:0});
  sumEl.innerHTML='';
  [{l:'סה"כ חוב',v:ils(totals.b),c:'var(--red)',bg:'rgba(248,113,113,.08)',br:'rgba(248,113,113,.2)'},
   {l:'תשלום חודשי',v:ils(totals.p),c:'var(--blue)',bg:'rgba(99,102,241,.08)',br:'rgba(99,102,241,.2)'},
   {l:'סה"כ ריבית',v:ils(totals.i),c:'var(--orange)',bg:'rgba(251,146,60,.08)',br:'rgba(251,146,60,.2)'}
  ].forEach(s=>{
    const b=div('sum-box',{style:{background:s.bg,border:'1px solid '+s.br}});
    add(b,mk('p',null,s.l,{style:{margin:'0',fontSize:'10px',color:s.c,fontWeight:'700',letterSpacing:'1px'}}),
      mk('p',null,s.v,{style:{margin:'4px 0 0',fontSize:'15px',fontWeight:'900',color:s.c}}));
    add(sumEl,b);
  });
}

// ═══════════════════════════════════════════════════════════
//  COMPARE VIEW
// ═══════════════════════════════════════════════════════════
function buildCompare(){
  const wrap=div();
  if(S.loans.length<2){
    const e=div('empty');add(e,mk('p',null,'⚖️',{style:{fontSize:'40px',margin:'0 0 12px'}}),mk('p','bolder','הוסף לפחות 2 הלוואות להשוואה'));
    return add(wrap,e);
  }
  add(wrap,mk('p',null,'השוואת כל ההלוואות',{style:{fontSize:'13px',color:'var(--text4)',marginBottom:'16px'}}));
  const rows=S.loans.map((l,i)=>({s:stats(l,S.cpi),loan:l,color:COLORS[i%COLORS.length]}));
  const maxB=Math.max(...rows.map(r=>r.s.balance),1);
  const maxI=Math.max(...rows.map(r=>r.s.totalInt),1);
  rows.forEach(r=>{
    const c=div('cmp-card',{style:{border:'1px solid '+r.color+'33'}});
    const top=div('row-between mb12');
    const left=div();
    add(left,tag(r.color,r.loan.loanType||'שפיצר'),mk('p',null,r.loan.name,{style:{margin:'6px 0 0',fontSize:'16px',fontWeight:'800'}}));
    add(top,left,mk('p',null,ils(r.s.balance),{style:{margin:'0',fontSize:'22px',fontWeight:'900',color:r.color}}));
    add(c,top);
    [{label:'יתרה נוכחית',v:r.s.balance,max:maxB,color:r.color},{label:'סה"כ ריבית',v:r.s.totalInt,max:maxI,color:'var(--orange)'}].forEach(bar=>{
      const bw=div('mb8');
      const bl=div('row-between smaller dim mb8');add(bl,mk('span',null,bar.label),mk('span',null,ils(bar.v)));
      const track=div(null,{style:{height:'6px',background:'rgba(255,255,255,.05)',borderRadius:'10px',overflow:'hidden'}});
      add(track,div(null,{style:{height:'100%',width:Math.round(bar.v/bar.max*100)+'%',background:bar.color,borderRadius:'10px',transition:'width .7s'}}));
      add(bw,bl,track);add(c,bw);
    });
    const meta=div('row mt12',{style:{gap:'16px',fontSize:'12px',flexWrap:'wrap'}});
    const metaItem=(label,val,color)=>{const s=mk('span',null,'');add(s,mk('span',null,label,{style:{color:'var(--text4)'}}),mk('span','bold',val,{style:{color}}));return s;};
    add(meta,metaItem('ריבית: ',r.loan.annualRate+'%','var(--text)'),metaItem('תשלום: ',ils(r.s.curPmt),r.color),metaItem('נותר: ',r.s.monthsLeft+' חודשים','var(--yellow)'));
    add(c,meta);add(wrap,c);
  });
  return wrap;
}

// ═══════════════════════════════════════════════════════════
//  MAIN RENDER
// ═══════════════════════════════════════════════════════════
function render(){
  const app=document.getElementById('app');
  app.innerHTML='';

  const totals=S.loans.reduce((a,l)=>{const s=stats(l,S.cpi);return{b:a.b+s.balance,p:a.p+s.curPmt,i:a.i+s.totalInt};},{b:0,p:0,i:0});
  const hasCpi=S.loans.some(l=>l.loanType==='צמוד מדד');

  // ── Header ──
  const hdr=div('hdr');const hw=div('wrap');

  const topBar=div('row-between mb16');
  const titleBlock=div();
  add(titleBlock,
    mk('p',null,'מעקב הלוואות',{style:{margin:'0',fontSize:'10px',color:'var(--accent)',fontWeight:'700',letterSpacing:'3px',textTransform:'uppercase'}}),
    mk('h1',null,'היד על הדופק 💳',{style:{margin:'2px 0 0',fontSize:'23px',fontWeight:'900'}}));
  add(topBar,titleBlock);

  const acts=div('row',{style:{gap:'8px'}});
  if(hasCpi)add(acts,btn(null,'📊 מדד',()=>openCpiSheet(),{style:{background:'rgba(16,185,129,.12)',border:'1px solid rgba(16,185,129,.25)',color:'#10b981',borderRadius:'12px',padding:'8px 12px',cursor:'pointer',fontSize:'12px',fontWeight:'800'}}));
  add(acts,
    btn(null,'📐',()=>openSimulatorSheet(),{style:{background:'rgba(139,92,246,.12)',border:'1px solid rgba(139,92,246,.25)',color:'#c4b5fd',borderRadius:'12px',padding:'8px 12px',cursor:'pointer',fontSize:'14px'}}),
    btn(null,'📗',exportCSV,{style:{background:'rgba(34,197,94,.12)',border:'1px solid rgba(34,197,94,.25)',color:'#4ade80',borderRadius:'12px',padding:'8px 12px',cursor:'pointer',fontSize:'14px'}}),
    btn(null,'＋ הלוואה',()=>openLoanSheet(null),{style:{background:'linear-gradient(135deg,var(--accent),var(--accent2))',border:'none',color:'#fff',borderRadius:'14px',padding:'10px 18px',cursor:'pointer',fontSize:'14px',fontWeight:'800',letterSpacing:'0.3px',boxShadow:'0 4px 14px rgba(99,102,241,.4)'}}));
  add(topBar,acts);add(hw,topBar);

  // Summary — FIX: id לצורך renderSummary()
  const sg=div('sum-grid',{id:'summary-grid'});
  [{l:'סה"כ חוב',v:ils(totals.b),c:'var(--red)',bg:'rgba(248,113,113,.08)',br:'rgba(248,113,113,.2)'},
   {l:'תשלום חודשי',v:ils(totals.p),c:'var(--blue)',bg:'rgba(99,102,241,.08)',br:'rgba(99,102,241,.2)'},
   {l:'סה"כ ריבית',v:ils(totals.i),c:'var(--orange)',bg:'rgba(251,146,60,.08)',br:'rgba(251,146,60,.2)'}
  ].forEach(s=>{
    const b=div('sum-box',{style:{background:s.bg,border:'1px solid '+s.br}});
    add(b,mk('p',null,s.l,{style:{margin:'0',fontSize:'10px',color:s.c,fontWeight:'700',letterSpacing:'1px'}}),
      mk('p',null,s.v,{style:{margin:'4px 0 0',fontSize:'15px',fontWeight:'900',color:s.c}}));
    add(sg,b);
  });
  add(hw,sg);

  // View tabs
  const vTabs=div('tabs');
  [['loans','הלוואות ('+S.loans.length+')'],['compare','השוואה']].forEach(([id,label])=>{
    const t=mk('button','tab',label);
    if(S.view===id)t.classList.add('on');
    t.addEventListener('click',()=>{S.view=id;render();});
    add(vTabs,t);
  });
  add(hw,vTabs);add(hdr,hw);add(app,hdr);

  // ── Content ──
  const content=div('content');
  if(S.view==='loans'){
    if(!S.loans.length){
      const e=div('empty',{style:{padding:'80px 0'}});
      add(e,mk('p',null,'🏦',{style:{fontSize:'52px',margin:'0 0 16px'}}),
        mk('p','bolder','אין הלוואות עדיין',{style:{fontSize:'18px',color:'var(--text4)',marginBottom:'8px'}}),
        mk('p','dim mb20','לחץ כדי להוסיף הלוואה ראשונה'),
        btn('btn-primary','+ הוסף הלוואה ראשונה',()=>openLoanSheet(null),{style:{maxWidth:'260px',margin:'0 auto'}}));
      add(content,e);
    }else{
      S.loans.forEach((loan,i)=>add(content,buildCard(loan,i)));
    }
  }else{
    add(content,buildCompare());
  }
  add(app,content);

  // Install banner (PWA)
  const bar=div('install-bar',{id:'install-bar'});
  const barText=div();
  add(barText,mk('p',null,'📲 הוסף לדף הבית',{style:{margin:'0',fontSize:'13px',fontWeight:'700',color:'var(--blue)'}}),
    mk('p',null,'התקן כאפליקציה על הטלפון',{style:{margin:'0',fontSize:'11px',color:'var(--text4)'}}));
  add(bar,barText,btn(null,'התקן',()=>{if(window._deferredInstall){window._deferredInstall.prompt();}},
    {style:{background:'linear-gradient(135deg,var(--accent),var(--accent2))',border:'none',color:'#fff',borderRadius:'10px',padding:'8px 16px',cursor:'pointer',fontWeight:'700',fontSize:'13px',whiteSpace:'nowrap'}}));
  add(app,bar);
}

// ═══════════════════════════════════════════════════════════
//  PWA & INIT
// ═══════════════════════════════════════════════════════════
if('serviceWorker' in navigator){
  // ?v= גורם לדפדפן לזהות שה-SW השתנה ולעדכן
  navigator.serviceWorker.register('./sw.js?v=20260316').then(reg=>{
    reg.addEventListener('updatefound',()=>{
      const newWorker=reg.installing;
      newWorker.addEventListener('statechange',()=>{
        if(newWorker.state==='installed'&&navigator.serviceWorker.controller){
          // יש גרסה חדשה — רענן אוטומטית
          window.location.reload();
        }
      });
    });
  }).catch(()=>{});
}

window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();window._deferredInstall=e;
  const b=document.getElementById('install-bar');
  if(b)b.style.display='flex';
});
window.addEventListener('appinstalled',()=>{
  const b=document.getElementById('install-bar');if(b)b.style.display='none';
});

render();
</script>
</body>
</html>
