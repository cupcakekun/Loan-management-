<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="30%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="cardg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.04"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="shadow1">
      <feDropShadow dx="0" dy="12" stdDeviation="22" flood-color="#000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- רקע -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <!-- ברק עדין בראש -->
  <rect width="1024" height="520" rx="224" fill="url(#sheen)"/>

  <!-- הילה רכה מאחורי הכרטיס -->
  <ellipse cx="512" cy="530" rx="260" ry="180" fill="#818cf8" opacity="0.18" filter="url(#blur1)"/>

  <!-- כרטיס — צל -->
  <rect x="152" y="296" width="720" height="432" rx="56" fill="#000" opacity="0.22" filter="url(#shadow1)" transform="translate(0,14)"/>

  <!-- כרטיס — גוף -->
  <rect x="152" y="296" width="720" height="432" rx="56" fill="url(#cardg)"/>
  <rect x="152" y="296" width="720" height="432" rx="56" fill="none" stroke="white" stroke-opacity="0.14" stroke-width="1.5"/>

  <!-- פס עליון עדין בתוך הכרטיס -->
  <rect x="152" y="296" width="720" height="2" rx="1" fill="white" opacity="0.18"/>

  <!-- שבב — עדין ופשוט -->
  <rect x="218" y="410" width="96" height="72" rx="14" fill="#f59e0b" opacity="0.75"/>
  <rect x="218" y="410" width="96" height="72" rx="14" fill="none" stroke="#fbbf24" stroke-opacity="0.4" stroke-width="1"/>
  <!-- קווי שבב -->
  <line x1="252" y1="410" x2="252" y2="482" stroke="#92400e" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="282" y1="410" x2="282" y2="482" stroke="#92400e" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="218" y1="436" x2="314" y2="436" stroke="#92400e" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="218" y1="456" x2="314" y2="456" stroke="#92400e" stroke-width="1" stroke-opacity="0.5"/>

  <!-- סמל ₪ — גדול, מרכזי, עדין -->
  <text x="660" y="508" font-family="Helvetica Neue, Arial, sans-serif"
        font-size="148" font-weight="200"
        fill="white" opacity="0.22"
        text-anchor="middle">₪</text>

  <!-- מספר כרטיס — נקודות בלבד, אלגנטי -->
  <text x="218" y="618"
        font-family="Helvetica Neue, Arial, sans-serif"
        font-size="30" font-weight="300" letter-spacing="10"
        fill="white" opacity="0.45">••••  ••••  ••••  4829</text>

  <!-- שם אפליקציה בתחתית הכרטיס -->
  <text x="218" y="682"
        font-family="Helvetica Neue, Arial, sans-serif"
        font-size="24" font-weight="400" letter-spacing="3"
        fill="white" opacity="0.35">היד על הדופק</text>

</svg>
